<!-- chat.html — loaded into #chat-section by componentLoader -->
<div class="flex flex-1 h-full overflow-hidden" style="background:var(--bg-app,#f5f5f7)">
  <!-- Left: conversation list -->
  <div id="chat-sidebar" class="flex flex-col w-72 flex-shrink-0 overflow-hidden" style="background:var(--bg-sidebar,#1d1d1f);border-right:1px solid rgba(255,255,255,0.06)">
    <div class="flex items-center justify-between p-4 flex-shrink-0" style="border-bottom:1px solid rgba(255,255,255,0.07)">
      <h2 class="text-sm font-bold text-white">Tin nhắn</h2>
      <button id="new-chat-btn" class="chat-new-btn flex items-center justify-center" title="Cuộc trò chuyện mới">
        <i class="fas fa-edit"></i>
      </button>
    </div>
    <div id="conversation-list" class="flex-1 overflow-y-auto py-2">
      <p class="text-xs text-center py-8" style="color:rgba(255,255,255,0.3)">
        <i class="fas fa-comment-dots text-2xl mb-2 block"></i>
        Chưa có cuộc trò chuyện nào
      </p>
    </div>
  </div>

  <!-- Right: active conversation -->
  <div id="chat-main" class="flex flex-col flex-1 overflow-hidden bg-white relative">
    <div id="chat-empty-state" class="flex flex-col items-center justify-center flex-1">
      <i class="fas fa-comments text-5xl text-slate-300 mb-4"></i>
      <p class="text-slate-400 text-sm">Chọn một cuộc trò chuyện để bắt đầu</p>
    </div>

    <div id="chat-active" class="hidden flex flex-col h-full">
      <div id="chat-header" class="flex items-center gap-2.5 px-4 py-3 flex-shrink-0 bg-white" style="border-bottom:1px solid rgba(0,0,0,0.08)">
        <button id="chat-back-btn" class="chat-back-btn flex items-center justify-center lg:hidden">
          <i class="fas fa-arrow-left"></i>
        </button>
        <div id="chat-header-avatar" class="ch-avatar flex items-center justify-center"></div>
        <div>
          <div id="chat-header-name" class="font-semibold text-sm text-slate-800"></div>
          <div id="chat-header-sub" class="text-xs text-slate-400"></div>
        </div>
      </div>

      <div id="message-area" class="flex-1 overflow-y-auto p-4">
        <div id="messages-inner" class="flex flex-col gap-2"></div>
      </div>

      <div class="flex items-center gap-2 px-3.5 py-2.5 flex-shrink-0 bg-white" style="border-top:1px solid rgba(0,0,0,0.08)">
        <input type="text" id="chat-input" class="chat-input" placeholder="Nhập tin nhắn..." maxlength="2000" autocomplete="off" />
        <button id="chat-send-btn" class="chat-send-btn flex items-center justify-center" title="Gửi">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- New direct chat modal -->
<div id="new-chat-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40">
  <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4">
    <h2 class="text-sm font-bold text-slate-800 mb-3">Nhắn tin mới</h2>
    <input id="new-chat-search" type="text" placeholder="Tìm bạn bè theo tên..."
      class="w-full px-3 py-2.5 text-sm rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:border-transparent mb-3" />
    <div id="new-chat-results" class="max-h-48 overflow-y-auto space-y-1"></div>
    <button id="cancel-new-chat"
      class="mt-4 w-full py-2 rounded-xl text-sm font-medium border border-slate-200 text-slate-600 hover:bg-slate-50">Huỷ</button>
  </div>
</div>

<script>
  (function () { if (window.ChatConversation) ChatConversation.init(); })();
</script>
