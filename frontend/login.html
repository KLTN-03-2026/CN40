<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập — Schedule With AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Merriweather:wght@400;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/newspaper-theme.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
  </head>
  <body class="auth-page">

    <!-- Masthead -->
    <div class="auth-masthead">
      <div class="auth-masthead-rule-thick"></div>
      <div class="auth-masthead-rule-thin"></div>
      <h1 class="auth-masthead-title">Schedule With AI</h1>
      <span class="auth-masthead-subtitle">Quản lý lịch trình thông minh</span>
      <div class="auth-masthead-rule-thin"></div>
      <div class="auth-masthead-rule-thick"></div>
    </div>

    <!-- Form card -->
    <div class="auth-card">
      <h2 class="auth-card-title">Đăng nhập</h2>
      <span class="auth-card-tagline">Chào mừng trở lại</span>

      <form id="loginForm" method="post" novalidate>
        <div class="auth-field">
          <label class="auth-label" for="username">Tên đăng nhập</label>
          <input
            class="auth-input"
            type="text"
            id="username"
            name="username"
            required
            autocomplete="username"
            placeholder="nhập tên đăng nhập..."
          />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="password">Mật khẩu</label>
          <input
            class="auth-input"
            type="password"
            id="password"
            name="password"
            required
            autocomplete="current-password"
            placeholder="nhập mật khẩu..."
          />
        </div>

        <button type="submit" class="auth-submit">Đăng nhập</button>
      </form>

      <hr class="auth-divider" />

      <p class="auth-switch">
        Chưa có tài khoản?
        <a href="register.html">Đăng ký ngay</a>
      </p>

      <div id="loading" class="auth-loading hidden">
        <div class="auth-spinner"></div>
        <p>Đang đăng nhập...</p>
      </div>
    </div>

    <!-- Footer rule -->
    <div class="auth-footer">
      <div class="auth-masthead-rule-thin"></div>
    </div>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const loginForm = document.getElementById("loginForm");
        const loading = document.getElementById("loading");

        loginForm.addEventListener("submit", async function (e) {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;

          if (!username || !password) {
            alert("Vui lòng nhập đầy đủ thông tin!");
            return;
          }

          try {
            loading.classList.remove("hidden");
            await AuthManager.login(username, password);
          } catch (error) {
            alert("Đăng nhập thất bại: " + error.message);
          } finally {
            loading.classList.add("hidden");
          }
        });
      });
    </script>
  </body>
</html>
