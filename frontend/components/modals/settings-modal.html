<div class="np-settings-modal">
  <!-- Header -->
  <div class="np-settings-header">
    <h3 class="np-settings-title">Cài đặt</h3>
    <button
      id="closeSettingsModal"
      class="np-settings-close"
      type="button"
      aria-label="Đóng"
      onclick="if(window.ModalManager) ModalManager.hideModal('settingsModal')"
    >&#x2715;</button>
  </div>

  <hr class="np-settings-rule" />

  <!-- Theme toggle row -->
  <div class="np-settings-section">
    <span class="np-label np-settings-section-label">Giao diện</span>
    <div class="np-settings-row">
      <span class="np-settings-row-icon">&#9790;</span>
      <span class="np-settings-row-text">Chế độ tối</span>
      <button
        id="themeToggleBtn"
        class="np-toggle"
        role="switch"
        aria-checked="false"
        onclick="window.ThemeManager && ThemeManager.toggle(); _npSyncToggle();"
        title="Chuyển sáng / tối"
      >
        <span class="np-toggle-thumb"></span>
      </button>
    </div>
  </div>

  <hr class="np-settings-rule" />

  <!-- Navigation links -->
  <div class="np-settings-section">
    <span class="np-label np-settings-section-label">Tài khoản</span>

    <button
      id="openProfileBtn"
      class="np-settings-link"
      type="button"
      onclick="if(window.ModalManager){ ModalManager.hideModal('settingsModal'); setTimeout(()=>ModalManager.showModal('profileModal'),150); }"
    >
      <span>&#9998;&ensp;Cập nhật hồ sơ</span>
      <span class="np-settings-chevron">&#8250;</span>
    </button>

    <button
      id="openNotificationBtn"
      class="np-settings-link"
      type="button"
      onclick="if(window.ModalManager){ ModalManager.hideModal('settingsModal'); setTimeout(()=>ModalManager.showModal('notificationModal'),150); }"
    >
      <span>&#9993;&ensp;Thông báo</span>
      <span class="np-settings-chevron">&#8250;</span>
    </button>
  </div>

  <hr class="np-settings-rule" />

  <!-- Info links (static) -->
  <div class="np-settings-section">
    <span class="np-label np-settings-section-label">Thông tin</span>

    <button class="np-settings-link" type="button">
      <span>&#9873;&ensp;Chính sách bảo mật</span>
    </button>

    <button class="np-settings-link" type="button">
      <span>&#9636;&ensp;Điều khoản dịch vụ</span>
    </button>

    <button class="np-settings-link np-settings-link--muted" type="button">
      <span>&#9881;&ensp;Ngôn ngữ</span>
      <span class="np-settings-meta">Tiếng Việt</span>
    </button>
  </div>

  <hr class="np-settings-rule" />

  <!-- Danger zone -->
  <div class="np-settings-section">
    <button
      id="logoutBtn"
      class="np-settings-link np-settings-link--danger"
      type="button"
    >
      <span>&#x21B5;&ensp;Đăng xuất</span>
    </button>
  </div>

  <!-- Version footer -->
  <div class="np-settings-footer">
    <span class="np-label">Phiên bản 1.0.0</span>
  </div>
</div>

<style>
/* ===== SETTINGS MODAL — Newspaper Style ===== */
.np-settings-modal {
  width: 320px;
  max-width: 95vw;
  background: var(--np-bg-card, #faf7f2);
  border: 1.5px solid var(--np-border, #1a1a1a);
  border-radius: var(--np-radius, 2px);
  box-shadow: var(--np-shadow, 4px 4px 0 #1a1a1a);
  padding: 1.25rem 1.5rem 1rem;
  font-family: var(--np-font-body, 'Merriweather', serif);
  color: var(--np-text, #1a1a1a);
}

/* Header */
.np-settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.75rem;
}

.np-settings-title {
  font-family: var(--np-font-heading, 'Playfair Display', serif);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--np-text, #1a1a1a);
  margin: 0;
}

.np-settings-close {
  background: transparent;
  border: 1px solid var(--np-border-muted, #c8b99a);
  border-radius: var(--np-radius, 2px);
  color: var(--np-text-muted, #6b5f4a);
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 0.85rem;
  line-height: 1;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}

.np-settings-close:hover {
  background: var(--np-border-muted, #c8b99a);
  color: var(--np-text, #1a1a1a);
  border-color: var(--np-border, #1a1a1a);
}

/* Horizontal rule */
.np-settings-rule {
  border: none;
  border-top: 1px solid var(--np-border-muted, #c8b99a);
  margin: 0.6rem 0;
}

/* Section */
.np-settings-section {
  padding: 0.4rem 0;
}

.np-settings-section-label {
  display: block;
  margin-bottom: 0.35rem;
}

/* Row item (theme toggle) */
.np-settings-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.35rem 0;
}

.np-settings-row-icon {
  font-size: 0.85rem;
  color: var(--np-text-muted, #6b5f4a);
  width: 1rem;
  text-align: center;
  flex-shrink: 0;
}

.np-settings-row-text {
  flex: 1;
  font-family: var(--np-font-ui, 'Inter', sans-serif);
  font-size: 0.85rem;
  color: var(--np-text, #1a1a1a);
}

/* Toggle switch */
.np-toggle {
  position: relative;
  width: 36px;
  height: 20px;
  background: var(--np-border-muted, #c8b99a);
  border: 1px solid var(--np-border, #1a1a1a);
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
  padding: 0;
}

.np-toggle[aria-checked="true"] {
  background: var(--np-accent, #8b0000);
  border-color: var(--np-accent, #8b0000);
}

.np-toggle-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}

.np-toggle[aria-checked="true"] .np-toggle-thumb {
  transform: translateX(16px);
}

/* Link rows */
.np-settings-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 0.45rem 0.5rem;
  background: transparent;
  border: none;
  border-radius: var(--np-radius, 2px);
  font-family: var(--np-font-ui, 'Inter', sans-serif);
  font-size: 0.85rem;
  color: var(--np-text, #1a1a1a);
  cursor: pointer;
  text-align: left;
  transition: background 0.12s;
}

.np-settings-link:hover {
  background: color-mix(in srgb, var(--np-bg-card, #faf7f2) 60%, var(--np-border-muted, #c8b99a) 40%);
}

.np-settings-link--muted {
  color: var(--np-text-muted, #6b5f4a);
}

.np-settings-link--danger {
  color: var(--np-accent, #8b0000);
}

.np-settings-link--danger:hover {
  background: color-mix(in srgb, var(--np-bg-card, #faf7f2) 70%, #8b0000 30%);
}

.np-settings-chevron {
  font-size: 1rem;
  color: var(--np-text-muted, #6b5f4a);
}

.np-settings-meta {
  font-size: 0.75rem;
  color: var(--np-text-muted, #6b5f4a);
  font-style: italic;
}

/* Footer */
.np-settings-footer {
  padding-top: 0.5rem;
  text-align: center;
}

/* Dark mode overrides */
body.dark .np-settings-modal {
  background: var(--np-bg-card, #221e19);
  border-color: var(--np-border, #4a4238);
  box-shadow: 4px 4px 0 var(--np-border, #4a4238);
  color: var(--np-text, #e8e0d0);
}

body.dark .np-settings-title { color: var(--np-text, #e8e0d0); }
body.dark .np-settings-rule  { border-color: var(--np-border-muted, #3a3028); }
body.dark .np-settings-close {
  border-color: var(--np-border-muted, #3a3028);
  color: var(--np-text-muted, #8a7f6a);
}
body.dark .np-settings-close:hover {
  background: var(--np-border-muted, #3a3028);
  border-color: var(--np-border, #4a4238);
  color: var(--np-text, #e8e0d0);
}
body.dark .np-settings-link { color: var(--np-text, #e8e0d0); }
body.dark .np-settings-link--muted { color: var(--np-text-muted, #8a7f6a); }
body.dark .np-settings-link--danger { color: var(--np-accent, #c44a4a); }
body.dark .np-toggle {
  background: var(--np-border-muted, #3a3028);
  border-color: var(--np-border, #4a4238);
}
body.dark .np-toggle[aria-checked="true"] {
  background: var(--np-accent, #c44a4a);
  border-color: var(--np-accent, #c44a4a);
}
</style>

<script>
  /* Sync toggle state with ThemeManager on load and after toggle */
  function _npSyncToggle() {
    const btn = document.getElementById('themeToggleBtn');
    if (!btn) return;
    const isDark = document.body.classList.contains('dark');
    btn.setAttribute('aria-checked', isDark ? 'true' : 'false');
  }

  // Run on load
  _npSyncToggle();

  // Listen for external theme changes
  document.addEventListener('theme-changed', _npSyncToggle);

  // Logout handler
  const _logoutBtn = document.getElementById('logoutBtn');
  if (_logoutBtn) {
    _logoutBtn.addEventListener('click', function () {
      if (window.AuthManager && AuthManager.logout) {
        AuthManager.logout();
      } else {
        localStorage.clear();
        location.href = '/login.html';
      }
    });
  }
</script>
