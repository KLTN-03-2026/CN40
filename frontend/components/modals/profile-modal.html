<!--
  NOTE: The outer "#profileModal" container is provided by index.html.
  Do NOT wrap the content in another profileModal element — componentLoader
  extracts only nested matches and drops sibling script/style tags.
-->
<div class="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 my-8">
  <!-- Header -->
    <div class="flex justify-between items-center p-6 border-b border-gray-200" style="background:#eff6ff">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white" style="background:var(--accent, #2563EB)">
          <i class="fas fa-user-edit"></i>
        </div>
        <div>
          <h3 class="text-xl font-semibold text-gray-800">Cập Nhật Hồ Sơ</h3>
          <p class="text-xs text-gray-500">Chỉnh sửa thông tin hoặc đổi mật khẩu</p>
        </div>
      </div>
      <button id="closeProfileModal" class="text-gray-500 hover:text-gray-700 text-2xl transition-colors">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-gray-200 px-4" role="tablist">
      <button type="button" class="profile-tab-btn px-4 py-3 text-sm font-semibold relative"
        data-tab="info" aria-selected="true"
        style="color:#2563EB">
        <i class="fas fa-id-card mr-2"></i>Thông tin cá nhân
      </button>
      <button type="button" class="profile-tab-btn px-4 py-3 text-sm font-semibold relative"
        data-tab="password" aria-selected="false"
        style="color:#64748b">
        <i class="fas fa-key mr-2"></i>Đổi mật khẩu
      </button>
    </div>

    <!-- TAB: INFO -->
    <div id="profile-tab-info" class="profile-tab-panel p-8 max-h-[calc(100vh-300px)] overflow-y-auto">
      <form id="profileInfoForm" class="space-y-6">
        <div class="flex flex-col items-center gap-3 pb-6 border-b border-gray-200">
          <div class="relative">
            <div class="w-24 h-24 rounded-full flex items-center justify-center text-white text-4xl font-bold shadow-lg overflow-hidden" style="background:var(--accent, #2563EB)"
              id="profileAvatar">?</div>
            <label for="avatarInput"
              class="absolute bottom-0 right-0 bg-indigo-500 hover:bg-indigo-600 text-white rounded-full p-2 cursor-pointer transition-colors shadow-md"
              title="Đổi ảnh đại diện">
              <i class="fas fa-camera text-sm"></i>
            </label>
            <input type="file" id="avatarInput" accept="image/png,image/jpeg,image/webp" class="hidden" />
          </div>
          <p class="text-xs text-gray-500">PNG / JPG / WebP · tối đa 2MB</p>
          <div id="avatarUploadStatus" class="text-xs" style="min-height:16px"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="form-group">
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              <i class="fas fa-user text-indigo-500 mr-2"></i>Họ Tên
            </label>
            <input type="text" id="fullName" name="hoten"
              placeholder="Nhập họ tên đầy đủ"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
              required />
          </div>

          <div class="form-group">
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              <i class="fas fa-at text-indigo-500 mr-2"></i>Tên Đăng Nhập
            </label>
            <input type="text" id="username" name="username"
              placeholder="Tên đăng nhập"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-100 transition"
              disabled />
          </div>

          <div class="form-group">
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              <i class="fas fa-envelope text-indigo-500 mr-2"></i>Email
            </label>
            <input type="email" id="email" name="email"
              placeholder="email@example.com"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
              required />
          </div>

          <div class="form-group">
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              <i class="fas fa-phone text-indigo-500 mr-2"></i>Số Điện Thoại
            </label>
            <input type="tel" id="phone" name="phone"
              placeholder="Nhập số điện thoại"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
          </div>

          <div class="form-group md:col-span-2">
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              <i class="fas fa-graduation-cap text-indigo-500 mr-2"></i>Học vấn
            </label>
            <select id="hocvan" name="hocvan"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition bg-white">
              <option value="">-- Không chọn --</option>
              <option value="thcs">THCS</option>
              <option value="thpt">THPT</option>
              <option value="dai_hoc">Đại học / Cao đẳng</option>
              <option value="di_lam">Đi làm</option>
              <option value="khac">Khác</option>
            </select>
            <p class="text-xs text-gray-500 mt-1">AI sẽ dựa vào mức này để điều chỉnh gợi ý phù hợp.</p>
          </div>
        </div>

        <div id="profileStatusMessage" class="hidden p-4 rounded-lg text-sm"></div>
      </form>

      <div class="flex justify-end gap-3 mt-6 pt-6 border-t border-gray-200">
        <button type="button" id="cancelProfileBtn"
          class="px-6 py-3 rounded-lg border border-gray-300 text-gray-700 font-medium hover:bg-gray-100 transition-colors">
          <i class="fas fa-times mr-2"></i>Hủy
        </button>
        <button type="button" id="saveProfileBtn"
          class="px-6 py-3 rounded-lg text-white font-medium transition-all shadow-md flex items-center gap-2" style="background:var(--accent, #2563EB)" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563EB'">
          <i class="fas fa-save"></i>Lưu thay đổi
        </button>
      </div>
    </div>

    <!-- TAB: PASSWORD -->
    <div id="profile-tab-password" class="profile-tab-panel p-8 max-h-[calc(100vh-300px)] overflow-y-auto" style="display:none">
      <form id="profilePasswordForm" class="space-y-5">
        <div class="form-group">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-lock text-indigo-500 mr-2"></i>Mật khẩu hiện tại
          </label>
          <input type="password" id="oldPassword" name="oldPassword" autocomplete="current-password"
            placeholder="Nhập mật khẩu cũ"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            required />
        </div>

        <div class="form-group">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-key text-indigo-500 mr-2"></i>Mật khẩu mới
          </label>
          <input type="password" id="newPassword" name="newPassword" autocomplete="new-password"
            placeholder="Tối thiểu 6 ký tự"
            minlength="6"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            required />
        </div>

        <div class="form-group">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            <i class="fas fa-check-double text-indigo-500 mr-2"></i>Xác nhận mật khẩu mới
          </label>
          <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password"
            placeholder="Nhập lại mật khẩu mới"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            required />
        </div>

        <div id="passwordStatusMessage" class="hidden p-4 rounded-lg text-sm"></div>
      </form>

      <div class="flex justify-end gap-3 mt-6 pt-6 border-t border-gray-200">
        <button type="button" id="cancelPasswordBtn"
          class="px-6 py-3 rounded-lg border border-gray-300 text-gray-700 font-medium hover:bg-gray-100 transition-colors">
          <i class="fas fa-times mr-2"></i>Hủy
        </button>
        <button type="button" id="savePasswordBtn"
          class="px-6 py-3 rounded-lg text-white font-medium transition-all shadow-md flex items-center gap-2" style="background:var(--accent, #2563EB)" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563EB'">
          <i class="fas fa-save"></i>Đổi mật khẩu
        </button>
      </div>
    </div>
</div>

<style>
  #profileModal {
    z-index: 10100 !important;
    position: fixed !important;
    inset: 0 !important;
    display: none !important;
    align-items: flex-start !important;
    justify-content: center !important;
    background: rgba(0, 0, 0, 0.5) !important;
    backdrop-filter: blur(4px) !important;
    overflow-y: auto !important;
    padding: 24px 0 !important;
  }
  #profileModal.show,
  #profileModal.active { display: flex !important; }
  #profileModal.hidden { display: none !important; }
  #profileModal .modal-content {
    max-height: calc(100vh - 48px) !important;
    background: white !important;
    border-radius: 20px !important;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3) !important;
    display: flex;
    flex-direction: column;
  }
  #profileModal .profile-tab-btn {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  #profileModal .profile-tab-btn[aria-selected="true"] {
    border-bottom-color: #2563EB;
  }
  #profileModal #profileAvatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>

<script>
  (function () {
    "use strict";

    bindProfileModalEvents();

    function bindProfileModalEvents() {
      const modal = document.getElementById("profileModal");
      if (!modal) { setTimeout(bindProfileModalEvents, 50); return; }
      const closeBtn = document.getElementById("closeProfileModal");
      const cancelBtn = document.getElementById("cancelProfileBtn");
      const cancelPwBtn = document.getElementById("cancelPasswordBtn");
      const saveBtn = document.getElementById("saveProfileBtn");
      const savePwBtn = document.getElementById("savePasswordBtn");
      const tabBtns = modal.querySelectorAll(".profile-tab-btn");

      const close = (e) => {
        e?.preventDefault();
        e?.stopPropagation();
        modal.classList.add("hidden");
        modal.classList.remove("show", "active");
        modal.style.display = "none";
        window.ModalManager?.close?.("profileModal");
        return false;
      };

      closeBtn && (closeBtn.onclick = close);
      cancelBtn && (cancelBtn.onclick = close);
      cancelPwBtn && (cancelPwBtn.onclick = close);

      modal.onclick = (e) => { if (e.target === modal) close(e); };
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !modal.classList.contains("hidden")) close(e);
      });

      tabBtns.forEach((btn) => {
        btn.onclick = () => switchTab(btn.dataset.tab);
      });

      if (saveBtn) {
        saveBtn.onclick = async (e) => {
          e?.preventDefault();
          if (window.ProfileManager?.saveProfile) await window.ProfileManager.saveProfile();
          return false;
        };
      }
      if (savePwBtn) {
        savePwBtn.onclick = async (e) => {
          e?.preventDefault();
          if (window.ProfileManager?.savePassword) await window.ProfileManager.savePassword();
          return false;
        };
      }
    }

    function switchTab(tab) {
      const modal = document.getElementById("profileModal");
      if (!modal) return;
      modal.querySelectorAll(".profile-tab-btn").forEach((b) => {
        const on = b.dataset.tab === tab;
        b.setAttribute("aria-selected", on ? "true" : "false");
        b.style.color = on ? "#2563EB" : "#64748b";
      });
      const info = document.getElementById("profile-tab-info");
      const pw = document.getElementById("profile-tab-password");
      if (info) info.style.display = tab === "info" ? "block" : "none";
      if (pw) pw.style.display = tab === "password" ? "block" : "none";
    }
  })();
</script>
