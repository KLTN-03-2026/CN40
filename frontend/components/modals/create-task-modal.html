<div class="modal-overlay" data-modal-close></div>

<div class="modal-content-wrapper">
  <div
    class="modal-content rounded-2xl shadow-2xl overflow-hidden"
    id="createTaskModalContent"
  >
    <!-- Header -->
    <div
      class="modal-header sticky top-0 z-10 px-6 py-4 flex justify-between items-center"
      style="background:linear-gradient(135deg,#1e3a5f 0%,#1e293b 100%)"
    >
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:rgba(255,255,255,0.15)">
          <i class="fas fa-plus text-white text-sm"></i>
        </div>
        <div>
          <h2 class="text-base font-bold" style="color:#f1f5f9">Tạo công việc mới</h2>
          <p class="text-xs" style="color:#94a3b8">Điền thông tin công việc bên dưới</p>
        </div>
      </div>
      <button
        id="closeCreateTaskBtn"
        class="w-8 h-8 rounded-lg flex items-center justify-center transition-all"
        style="background:rgba(255,255,255,0.1);color:#94a3b8"
        onmouseover="this.style.background='rgba(255,255,255,0.2)';this.style.color='#f1f5f9'"
        onmouseout="this.style.background='rgba(255,255,255,0.1)';this.style.color='#94a3b8'"
        aria-label="Close"
      >
        <i class="fas fa-times text-sm"></i>
      </button>
    </div>

    <div class="modal-body p-5 overflow-y-auto" style="max-height:75vh">
      <form id="createTaskForm" class="space-y-4">

        <!-- Title -->
        <div>
          <label for="taskTitle" class="block text-xs font-semibold mb-1.5" style="color:#374151">
            TIÊU ĐỀ CÔNG VIỆC <span style="color:#ef4444">*</span>
          </label>
          <input
            type="text"
            id="taskTitle"
            name="taskTitle"
            required
            class="w-full px-3.5 py-2.5 rounded-xl border text-sm transition-all focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent"
            style="border-color:#e2e8f0;background:#f8fafc"
            placeholder="Nhập tiêu đề công việc..."
          />
        </div>

        <!-- Description -->
        <div>
          <label for="taskDescription" class="block text-xs font-semibold mb-1.5" style="color:#374151">
            MÔ TẢ <span style="color:#94a3b8;font-weight:400">(tùy chọn)</span>
          </label>
          <textarea
            id="taskDescription"
            name="taskDescription"
            rows="2"
            class="w-full px-3.5 py-2.5 rounded-xl border text-sm transition-all focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent resize-none"
            style="border-color:#e2e8f0;background:#f8fafc"
            placeholder="Nhập mô tả chi tiết..."
          ></textarea>
        </div>

        <!-- Priority chips -->
        <div>
          <label class="block text-xs font-semibold mb-1.5" style="color:#374151">MỨC ĐỘ ƯU TIÊN</label>
          <div class="grid grid-cols-4 gap-2" id="priorityChipsContainer">
            <label class="cursor-pointer">
              <input type="radio" name="taskPriority" value="1" class="sr-only" />
              <div class="priority-chip text-center py-2 px-1 rounded-xl border-2 transition-all text-xs font-semibold select-none" data-priority="1">
                <div class="priority-chip-dot w-3 h-3 rounded-full mx-auto mb-1"></div>
                Thấp
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" name="taskPriority" value="2" checked class="sr-only" />
              <div class="priority-chip text-center py-2 px-1 rounded-xl border-2 transition-all text-xs font-semibold select-none" data-priority="2">
                <div class="priority-chip-dot w-3 h-3 rounded-full mx-auto mb-1"></div>
                Trung bình
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" name="taskPriority" value="3" class="sr-only" />
              <div class="priority-chip text-center py-2 px-1 rounded-xl border-2 transition-all text-xs font-semibold select-none" data-priority="3">
                <div class="priority-chip-dot w-3 h-3 rounded-full mx-auto mb-1"></div>
                Cao
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" name="taskPriority" value="4" class="sr-only" />
              <div class="priority-chip text-center py-2 px-1 rounded-xl border-2 transition-all text-xs font-semibold select-none" data-priority="4">
                <div class="priority-chip-dot w-3 h-3 rounded-full mx-auto mb-1"></div>
                Rất cao
              </div>
            </label>
          </div>
        </div>

        <!-- Category + Tag row -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <div class="flex justify-between items-center mb-1.5">
              <label class="block text-xs font-semibold" style="color:#374151">DANH MỤC</label>
              <button
                type="button"
                id="createNewCategoryBtn"
                class="text-xs font-medium"
                style="color:#dc2626"
                onmouseover="this.style.color='#b91c1c'"
                onmouseout="this.style.color='#dc2626'"
              >
                <i class="fas fa-plus mr-0.5"></i> Thêm
              </button>
            </div>
            <div
              id="category-container"
              class="rounded-xl border p-2 min-h-[56px] max-h-[120px] overflow-y-auto"
              style="border-color:#e2e8f0;background:#f8fafc"
            >
              <div class="text-gray-400 text-center py-2 text-xs" id="category-loading">
                <i class="fas fa-spinner fa-spin mr-1"></i> Đang tải...
              </div>
            </div>
          </div>
          <div>
            <label for="taskTag" class="block text-xs font-semibold mb-1.5" style="color:#374151">TAG</label>
            <input
              type="text"
              id="taskTag"
              name="taskTag"
              class="w-full px-3.5 py-2.5 rounded-xl border text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent"
              style="border-color:#e2e8f0;background:#f8fafc"
              placeholder="urgent, project..."
            />
          </div>
        </div>

        <!-- Duration + Hourly Wage row -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="taskDuration" class="block text-xs font-semibold mb-1.5" style="color:#374151">
              THỜI GIAN ƯỚC TÍNH <span style="color:#94a3b8;font-weight:400">(phút)</span>
            </label>
            <input
              type="number"
              id="taskDuration"
              name="taskDuration"
              value="60"
              min="5"
              step="5"
              class="w-full px-3.5 py-2.5 rounded-xl border text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent"
              style="border-color:#e2e8f0;background:#f8fafc"
            />
          </div>
          <div>
            <label for="taskHourlyWage" class="block text-xs font-semibold mb-1.5" style="color:#374151">
              LƯƠNG GIỜ <span style="color:#94a3b8;font-weight:400">(VND)</span>
            </label>
            <input
              type="number"
              id="taskHourlyWage"
              name="taskHourlyWage"
              value="0"
              min="0"
              step="1000"
              class="w-full px-3.5 py-2.5 rounded-xl border text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent"
              style="border-color:#e2e8f0;background:#f8fafc"
            />
          </div>
        </div>

        <!-- AI fields -->
        <div class="rounded-xl p-3.5" style="background:#fff0f0;border:1px solid #fecaca">
          <div class="flex items-center gap-2 mb-3">
            <i class="fas fa-brain text-xs" style="color:#dc2626"></i>
            <span class="text-xs font-semibold" style="color:#b91c1c">GỢI Ý CHO AI LÊN LỊCH</span>
          </div>
          <div class="grid grid-cols-3 gap-3">
            <div>
              <label for="taskComplexity" class="block text-xs font-medium mb-1" style="color:#374151">Độ phức tạp</label>
              <select
                id="taskComplexity"
                name="taskComplexity"
                class="w-full px-2.5 py-2 rounded-lg border text-xs focus:outline-none focus:ring-2 focus:ring-red-500"
                style="border-color:#fecaca;background:#fff;color:#374151"
              >
                <option value="">Chọn...</option>
                <option value="1">Đơn giản</option>
                <option value="2">Trung bình</option>
                <option value="3">Phức tạp</option>
                <option value="4">Rất phức tạp</option>
              </select>
            </div>
            <div>
              <label for="taskFocusLevel" class="block text-xs font-medium mb-1" style="color:#374151">Tập trung</label>
              <select
                id="taskFocusLevel"
                name="taskFocusLevel"
                class="w-full px-2.5 py-2 rounded-lg border text-xs focus:outline-none focus:ring-2 focus:ring-red-500"
                style="border-color:#fecaca;background:#fff;color:#374151"
              >
                <option value="">Chọn...</option>
                <option value="1">Thấp</option>
                <option value="2">Trung bình</option>
                <option value="3">Cao</option>
                <option value="4">Rất cao</option>
              </select>
            </div>
            <div>
              <label for="taskSuitableTime" class="block text-xs font-medium mb-1" style="color:#374151">Thời điểm</label>
              <select
                id="taskSuitableTime"
                name="taskSuitableTime"
                class="w-full px-2.5 py-2 rounded-lg border text-xs focus:outline-none focus:ring-2 focus:ring-red-500"
                style="border-color:#fecaca;background:#fff;color:#374151"
              >
                <option value="">Chọn...</option>
                <option value="1">Sáng</option>
                <option value="2">Trưa</option>
                <option value="3">Chiều</option>
                <option value="4">Tối</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Fixed Time Toggle -->
        <div class="rounded-xl border p-4" style="border-color:#e2e8f0;background:#f8fafc">
          <label class="flex items-center gap-3 cursor-pointer">
            <div class="relative flex-shrink-0">
              <input type="checkbox" id="taskFixedTime" class="sr-only peer" />
              <div class="w-10 h-5 rounded-full transition-all peer-checked:bg-red-600" style="background:#cbd5e1"></div>
              <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-all peer-checked:translate-x-5"></div>
            </div>
            <div>
              <span class="text-sm font-semibold" style="color:#1e293b">Có thời gian cố định</span>
              <p class="text-xs" style="color:#94a3b8">Đặt ngày giờ cụ thể cho công việc này</p>
            </div>
          </label>

          <div id="fixedTimeFields" class="hidden mt-4 space-y-4">
            <!-- Time block -->
            <div class="rounded-xl border p-3" style="border-color:#e2e8f0;background:#fff">
              <div class="flex items-center gap-2 mb-2">
                <i class="fas fa-clock text-xs" style="color:#dc2626"></i>
                <span class="text-xs font-semibold" style="color:#374151">THỜI GIAN</span>
              </div>
              <div class="grid grid-cols-3 gap-2">
                <div>
                  <label for="taskFixedStartHour" class="block text-[10px] font-medium mb-1" style="color:#64748b">BẮT ĐẦU <span style="color:#ef4444">*</span></label>
                  <input
                    type="time"
                    id="taskFixedStartHour"
                    name="taskFixedStartHour"
                    value="09:00"
                    class="w-full px-2.5 py-2 rounded-lg border text-xs focus:outline-none focus:ring-2 focus:ring-red-500"
                    style="border-color:#e2e8f0;background:#f8fafc"
                  />
                </div>
                <div>
                  <label for="taskFixedEndHour" class="block text-[10px] font-medium mb-1" style="color:#64748b">KẾT THÚC</label>
                  <input
                    type="time"
                    id="taskFixedEndHour"
                    name="taskFixedEndHour"
                    value="10:00"
                    class="w-full px-2.5 py-2 rounded-lg border text-xs focus:outline-none focus:ring-2 focus:ring-red-500"
                    style="border-color:#e2e8f0;background:#f8fafc"
                  />
                </div>
                <div>
                  <label for="taskFixedDuration" class="block text-[10px] font-medium mb-1" style="color:#64748b">THỜI LƯỢNG (phút)</label>
                  <input
                    type="number"
                    id="taskFixedDuration"
                    name="taskFixedDuration"
                    value="60"
                    min="5"
                    step="5"
                    class="w-full px-2.5 py-2 rounded-lg border text-xs focus:outline-none focus:ring-2 focus:ring-red-500"
                    style="border-color:#e2e8f0;background:#f8fafc"
                  />
                </div>
              </div>
              <p class="text-[10px] mt-1.5" style="color:#94a3b8">
                Chỉnh <b>Kết thúc</b> hoặc <b>Thời lượng</b>, giá trị còn lại sẽ tự cập nhật.
              </p>
            </div>

            <!-- Date block -->
            <div class="rounded-xl border p-3" style="border-color:#e2e8f0;background:#fff">
              <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                  <i class="fas fa-calendar-day text-xs" style="color:#dc2626"></i>
                  <span class="text-xs font-semibold" style="color:#374151">NGÀY THỰC HIỆN</span>
                  <span id="taskFixedDateCount" class="text-[10px] font-medium px-1.5 py-0.5 rounded-full" style="background:#fee2e2;color:#b91c1c">0</span>
                </div>
                <div class="flex items-center gap-1">
                  <button type="button" id="taskFixedPrevMonth" class="w-6 h-6 rounded flex items-center justify-center transition-colors" style="color:#64748b" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'" aria-label="Tháng trước">
                    <i class="fas fa-chevron-left text-[10px]"></i>
                  </button>
                  <span id="taskFixedMonthLabel" class="text-xs font-semibold" style="color:#1e293b;min-width:90px;text-align:center"></span>
                  <button type="button" id="taskFixedNextMonth" class="w-6 h-6 rounded flex items-center justify-center transition-colors" style="color:#64748b" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'" aria-label="Tháng sau">
                    <i class="fas fa-chevron-right text-[10px]"></i>
                  </button>
                </div>
              </div>
              <div id="taskFixedMiniCal" class="grid grid-cols-7 gap-1 text-center text-[10px]"></div>
              <div id="taskFixedSelectedChips" class="flex flex-wrap gap-1 mt-2"></div>
              <p class="text-[10px] mt-1.5" style="color:#94a3b8">Nhấn chọn nhiều ngày. Ngày trong quá khứ không thể chọn.</p>
            </div>

            <!-- Repeat -->
            <div>
              <label for="taskRepeatOption" class="block text-xs font-semibold mb-1.5" style="color:#374151">LẶP LẠI</label>
              <select
                id="taskRepeatOption"
                name="taskRepeatOption"
                class="w-full px-3 py-2 rounded-xl border text-sm focus:outline-none focus:ring-2 focus:ring-red-500"
                style="border-color:#e2e8f0;background:#fff;color:#374151"
              >
                <option value="">Không lặp</option>
                <option value="daily">Hàng ngày</option>
                <option value="weekly">Hàng tuần</option>
                <option value="monthly">Hàng tháng</option>
                <option value="custom">Tùy chỉnh</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Footer Buttons -->
        <div class="flex justify-end gap-3 pt-2">
          <button
            type="button"
            id="cancelCreateTaskBtn"
            class="px-5 py-2.5 text-sm font-semibold rounded-xl border transition-all"
            style="border-color:#e2e8f0;color:#64748b;background:#f8fafc"
            onmouseover="this.style.background='#f1f5f9';this.style.borderColor='#cbd5e1'"
            onmouseout="this.style.background='#f8fafc';this.style.borderColor='#e2e8f0'"
          >
            Hủy
          </button>
          <button
            type="submit"
            class="px-5 py-2.5 text-sm font-semibold text-white rounded-xl flex items-center gap-2 transition-all"
            style="background:linear-gradient(135deg,#dc2626,#4f46e5);box-shadow:0 4px 12px rgba(220,38,38,0.3)"
            onmouseover="this.style.boxShadow='0 6px 18px rgba(220,38,38,0.45)'"
            onmouseout="this.style.boxShadow='0 4px 12px rgba(220,38,38,0.3)'"
          >
            <span class="submit-text flex items-center gap-2">
              <i class="fas fa-plus text-xs"></i> Tạo công việc
            </span>
            <span class="submit-loading hidden">
              <i class="fas fa-spinner fa-spin"></i> Đang xử lý...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  // ===== Priority chip helpers =====
  function getPriority() {
    const checked = document.querySelector('input[name="taskPriority"]:checked');
    return checked ? parseInt(checked.value) : 2;
  }

  function setPriority(val) {
    const radio = document.querySelector(`input[name="taskPriority"][value="${val}"]`);
    if (radio) {
      radio.checked = true;
      updatePriorityChips();
    }
  }

  function updatePriorityChips() {
    const getColor = (p) => (window.PriorityTheme ? PriorityTheme.getColor(p) : "#3B82F6");
    document.querySelectorAll('input[name="taskPriority"]').forEach(r => {
      const chip = r.nextElementSibling;
      if (!chip) return;
      const hex = getColor(r.value);
      // Soft tints derived from the priority hex (appended hex alpha: 22 ≈ 13%, 33 ≈ 20%).
      const dot = chip.querySelector('.priority-chip-dot');
      if (dot) dot.style.background = hex;
      if (r.checked) {
        chip.style.borderColor = hex;
        chip.style.background = hex + '22';
        chip.style.color = hex;
        chip.style.boxShadow = '0 1px 3px rgba(15,23,42,0.08)';
      } else {
        chip.style.borderColor = hex + '33';
        chip.style.background = hex + '11';
        chip.style.color = hex;
        chip.style.boxShadow = 'none';
      }
      chip.style.transform = 'scale(1)';
    });
  }
  // Re-paint when user customizes palette (W2).
  document.addEventListener('priority-colors-changed', updatePriorityChips);

  // Init chip events
  document.querySelectorAll('input[name="taskPriority"]').forEach(radio => {
    radio.addEventListener('change', updatePriorityChips);
  });
  updatePriorityChips();

  // Guard: prevent category modal from auto-opening
  (function () {
    const categoryModal = document.getElementById("createCategoryModal");
    if (!categoryModal) return;
    categoryModal.style.display = "none";
    categoryModal.classList.add("hidden");
  })();

  // ===== Helper functions =====
  function formatDateTime(date) {
    const d = new Date(date);
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    const hours = String(d.getHours()).padStart(2, "0");
    const minutes = String(d.getMinutes()).padStart(2, "0");
    return `${year}-${month}-${day}T${hours}:${minutes}`;
  }

  // Convert "HH:MM" → minutes since midnight.
  function hmToMinutes(hm) {
    if (!hm || typeof hm !== "string") return NaN;
    const [h, m] = hm.split(":").map((v) => parseInt(v, 10));
    if (isNaN(h) || isNaN(m)) return NaN;
    return h * 60 + m;
  }

  function minutesToHM(mins) {
    const norm = ((mins % 1440) + 1440) % 1440;
    const h = Math.floor(norm / 60);
    const m = norm % 60;
    return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
  }

  // When start or duration changes → recalc end.
  function recalcEndFromDuration() {
    const startHour = document.getElementById("taskFixedStartHour");
    const endHour = document.getElementById("taskFixedEndHour");
    const duration = document.getElementById("taskFixedDuration");
    if (!startHour || !endHour || !duration) return;
    const startMins = hmToMinutes(startHour.value);
    const dur = parseInt(duration.value) || 0;
    if (isNaN(startMins) || dur <= 0) return;
    endHour.value = minutesToHM(startMins + dur);
  }

  // When end changes → recalc duration.
  function recalcDurationFromEnd() {
    const startHour = document.getElementById("taskFixedStartHour");
    const endHour = document.getElementById("taskFixedEndHour");
    const duration = document.getElementById("taskFixedDuration");
    if (!startHour || !endHour || !duration) return;
    const s = hmToMinutes(startHour.value);
    const e = hmToMinutes(endHour.value);
    if (isNaN(s) || isNaN(e)) return;
    let diff = e - s;
    if (diff <= 0) diff += 1440;
    duration.value = diff;
  }

  // --------- Mini-calendar state (multi-date selection) ---------
  const FixedDates = {
    _cursor: null,           // Date anchored to first day of viewing month
    _selected: new Set(),    // set of "YYYY-MM-DD" strings

    _todayKey() {
      const t = new Date();
      return this._dateKey(new Date(t.getFullYear(), t.getMonth(), t.getDate()));
    },

    _dateKey(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    },

    _parseKey(key) {
      const [y, m, d] = key.split("-").map((v) => parseInt(v, 10));
      return new Date(y, m - 1, d);
    },

    getSelectedKeys() {
      return [...this._selected].sort();
    },

    reset() {
      const t = new Date();
      this._cursor = new Date(t.getFullYear(), t.getMonth(), 1);
      this._selected = new Set([this._todayKey()]);
    },

    setSelectedKeys(keys) {
      this._selected = new Set(keys.filter(Boolean));
      if (this._selected.size === 0) this._selected.add(this._todayKey());
    },

    prevMonth() {
      this._cursor = new Date(this._cursor.getFullYear(), this._cursor.getMonth() - 1, 1);
      this.render();
    },

    nextMonth() {
      this._cursor = new Date(this._cursor.getFullYear(), this._cursor.getMonth() + 1, 1);
      this.render();
    },

    toggle(key) {
      if (this._selected.has(key)) {
        if (this._selected.size > 1) this._selected.delete(key);
      } else {
        this._selected.add(key);
      }
      this.render();
    },

    render() {
      const grid = document.getElementById("taskFixedMiniCal");
      const label = document.getElementById("taskFixedMonthLabel");
      const chips = document.getElementById("taskFixedSelectedChips");
      const counter = document.getElementById("taskFixedDateCount");
      if (!grid || !label || !chips || !counter) return;

      const y = this._cursor.getFullYear();
      const m = this._cursor.getMonth();
      label.textContent = `Tháng ${m + 1}/${y}`;

      const firstDow = new Date(y, m, 1).getDay(); // 0 = Sun
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const todayKey = this._todayKey();
      const dow = ["CN", "T2", "T3", "T4", "T5", "T6", "T7"];

      let html = dow.map((d) => `<div class="font-semibold py-1" style="color:#94a3b8">${d}</div>`).join("");
      for (let i = 0; i < firstDow; i++) html += `<div></div>`;

      for (let day = 1; day <= daysInMonth; day++) {
        const key = this._dateKey(new Date(y, m, day));
        const isPast = key < todayKey;
        const isToday = key === todayKey;
        const isSelected = this._selected.has(key);
        const base = "w-full h-7 rounded-md flex items-center justify-center transition-colors";
        let style = "";
        if (isPast) {
          style = "color:#cbd5e1;cursor:not-allowed;background:#f8fafc";
        } else if (isSelected) {
          style = "color:#fff;background:#dc2626;font-weight:700;cursor:pointer";
        } else if (isToday) {
          style = "color:#b91c1c;background:#fee2e2;font-weight:600;cursor:pointer";
        } else {
          style = "color:#1e293b;cursor:pointer";
        }
        html += `<div class="${base}" data-date-key="${key}" data-past="${isPast ? 1 : 0}" style="${style}">${day}</div>`;
      }
      grid.innerHTML = html;

      // Selected chips
      const sorted = this.getSelectedKeys();
      counter.textContent = sorted.length;
      chips.innerHTML = sorted.length
        ? sorted.map((k) => {
            const d = this._parseKey(k);
            const label = `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}`;
            return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold" style="background:#fee2e2;color:#b91c1c" data-chip-key="${k}">
              ${label}<button type="button" class="hover:text-red-900" data-remove-key="${k}" aria-label="Bỏ chọn">&times;</button>
            </span>`;
          }).join("")
        : `<span class="text-[10px] italic" style="color:#94a3b8">Chưa chọn ngày nào</span>`;
    },

    bind() {
      const grid = document.getElementById("taskFixedMiniCal");
      const chips = document.getElementById("taskFixedSelectedChips");
      const prev = document.getElementById("taskFixedPrevMonth");
      const next = document.getElementById("taskFixedNextMonth");
      if (grid && !grid._bound) {
        grid._bound = true;
        grid.addEventListener("click", (e) => {
          const cell = e.target.closest("[data-date-key]");
          if (!cell || cell.dataset.past === "1") return;
          this.toggle(cell.dataset.dateKey);
        });
      }
      if (chips && !chips._bound) {
        chips._bound = true;
        chips.addEventListener("click", (e) => {
          const btn = e.target.closest("[data-remove-key]");
          if (!btn) return;
          this._selected.delete(btn.dataset.removeKey);
          if (this._selected.size === 0) this._selected.add(this._todayKey());
          this.render();
        });
      }
      if (prev && !prev._bound) { prev._bound = true; prev.addEventListener("click", () => this.prevMonth()); }
      if (next && !next._bound) { next._bound = true; next.addEventListener("click", () => this.nextMonth()); }
    },
  };

  let loadCategoriesRetries = 0;
  const MAX_RETRIES = 5;

  async function loadCategoriesForModal() {
    const container = document.getElementById("category-container");
    if (!container) {
      if (loadCategoriesRetries < MAX_RETRIES) {
        loadCategoriesRetries++;
        await new Promise(r => setTimeout(r, 100));
        return loadCategoriesForModal();
      }
      return;
    }
    loadCategoriesRetries = 0;
    container.innerHTML = `<div id="category-loading" class="text-gray-400 text-center py-2 text-xs"><i class="fas fa-spinner fa-spin mr-1"></i>Đang tải...</div>`;
    try {
      const token = localStorage.getItem("auth_token");
      if (!token) throw new Error("No auth token");
      const response = await fetch("/api/categories", {
        headers: { Accept: "application/json", Authorization: `Bearer ${token}` },
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const result = await response.json();
      if (result.success && result.data) renderCategories(result.data);
      else throw new Error(result.message || "Failed to load categories");
    } catch (error) {
      container.innerHTML = `<div class="text-red-500 text-center p-2 text-xs"><i class="fas fa-exclamation-triangle mr-1"></i>${error.message} <button onclick="loadCategoriesForModal()" class="text-red-500 underline ml-1">Thử lại</button></div>`;
    }
  }

  function renderCategories(categories) {
    const container = document.getElementById("category-container");
    if (!container) return;
    if (!categories || categories.length === 0) {
      container.innerHTML = `<div class="text-gray-400 text-center py-3 text-xs italic">Chưa có danh mục. Nhấn "+ Thêm" để tạo.</div>`;
      return;
    }
    container.innerHTML = categories.map((cat, i) => `
      <div class="flex items-center rounded-lg px-2 py-1.5 mb-1 hover:bg-red-50 transition-colors">
        <label class="flex items-center gap-2 cursor-pointer flex-1">
          <input type="radio" name="taskCategory" value="${cat.MaLoai}" class="category-radio h-3.5 w-3.5 text-red-600" ${i === 0 ? "checked" : ""} />
          <span class="text-xs font-medium text-gray-700">${cat.TenLoai}</span>
        </label>
      </div>
    `).join("");
  }

  function getTagsFromInput() {
    const tagInput = document.getElementById("taskTag");
    if (!tagInput || !tagInput.value.trim()) return [];
    return tagInput.value.trim().split(",").map(t => t.trim()).filter(t => t.length > 0);
  }

  function getSelectedCategoryId() {
    const sel = document.querySelector('input[name="taskCategory"]:checked');
    return sel ? sel.value : null;
  }

  function showConfirmDialog(title, message) {
    return new Promise(resolve => {
      if (typeof Swal !== "undefined") {
        Swal.fire({ title, html: message, icon: "warning", showCancelButton: true,
          confirmButtonColor: "#3085d6", cancelButtonColor: "#d33",
          confirmButtonText: "Đồng ý", cancelButtonText: "Hủy" }).then(r => resolve(r.isConfirmed));
      } else {
        resolve(confirm(`${title}\n\n${message.replace(/<[^>]*>/g, "")}`));
      }
    });
  }

  function showNotification(message, type = "info") {
    if (window.Utils && typeof Utils.showToast === "function") {
      Utils.showToast(message, type); return;
    }
    const toast = document.createElement("div");
    toast.className = `fixed top-4 right-4 z-50 px-4 py-3 rounded-md shadow-lg transition-all duration-300 ${
      type === "success" ? "bg-green-500 text-white" : type === "error" ? "bg-red-500 text-white" : "bg-red-500 text-white"}`;
    toast.innerHTML = `<div class="flex items-center gap-2"><i class="fas ${
      type === "success" ? "fa-check-circle" : type === "error" ? "fa-exclamation-circle" : "fa-info-circle"
    }"></i><span>${message}</span></div>`;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.transform = "translateX(120%)"; setTimeout(() => toast.remove(), 300); }, 3000);
  }

  function triggerModalSidebarRefresh() {
    document.dispatchEvent(new CustomEvent("task-changed", {
      detail: { action: "refresh", source: "createTaskModal", timestamp: Date.now() }
    }));
    if (typeof window.triggerSidebarRefresh === "function") {
      setTimeout(() => window.triggerSidebarRefresh(), 300);
    }
  }

  // ===== Close modal =====
  function closeMainModal() {
    const form = document.getElementById("createTaskForm");
    if (form) {
      form.reset();
      setPriority("2");
      const fixedTimeEl = document.getElementById("taskFixedTime");
      if (fixedTimeEl) fixedTimeEl.checked = false;
      document.getElementById("fixedTimeFields")?.classList.add("hidden");
    }
    window._createTaskModalInitialized = false;
    if (window.ModalManager && window.ModalManager.close) {
      setTimeout(() => window.ModalManager.close("createTaskModal"), 100);
    }
  }

  // ===== Reset to create mode =====
  function resetFormToCreateMode() {
    const form = document.getElementById("createTaskForm");
    if (form) {
      form.reset();
      setPriority("2");
      const fixedTimeEl = document.getElementById("taskFixedTime");
      if (fixedTimeEl) fixedTimeEl.checked = false;
      document.getElementById("fixedTimeFields")?.classList.add("hidden");
      const modalTitle = document.querySelector("#createTaskModalContent h2");
      if (modalTitle) modalTitle.textContent = "Tạo công việc mới";
      const submitBtn = document.querySelector("#createTaskForm button[type='submit'] .submit-text");
      if (submitBtn) submitBtn.innerHTML = '<i class="fas fa-plus text-xs"></i> Tạo công việc';
      window.currentEditingTaskId = null;
    }
  }

  // ===== Update task handler =====
  async function handleUpdateTaskForm(taskId, formData) {
    try {
      const token = localStorage.getItem("auth_token");
      if (!token) { showNotification("Vui lòng đăng nhập lại", "error"); return; }
      const response = await fetch(`/api/tasks/${taskId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify(formData),
      });
      const result = await response.json();
      if (result.success) {
        showNotification("Cập nhật công việc thành công!", "success");
        triggerModalSidebarRefresh();
        closeMainModal();
        window.WorkManager?.reload?.();
        window.dispatchEvent(new CustomEvent("taskUpdated", { detail: { taskId } }));
        window.currentEditingTaskId = null;
      } else {
        showNotification(result.message || "Lỗi khi cập nhật công việc", "error");
      }
    } catch (error) {
      showNotification("Lỗi kết nối máy chủ", "error");
    }
  }

  // ===== Submit handler (create + update) =====
  function handleCreateTaskForm() {
    const form = document.getElementById("createTaskForm");
    if (!form || form._submitHandlerAttached) return;
    form._submitHandlerAttached = true;

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      e.stopPropagation();
      const isEditing = !!window.currentEditingTaskId;
      const submitBtn = form.querySelector("button[type='submit']");
      const submitText = submitBtn?.querySelector(".submit-text");
      const submitLoading = submitBtn?.querySelector(".submit-loading");
      if (submitText && submitLoading) {
        submitText.classList.add("hidden");
        submitLoading.classList.remove("hidden");
        submitBtn.disabled = true;
      }
      try {
        const formData = {
          TieuDe: document.getElementById("taskTitle").value.trim(),
          MoTa: document.getElementById("taskDescription").value.trim(),
          ThoiGianUocTinh: parseInt(document.getElementById("taskDuration").value) || 60,
          MucDoUuTien: getPriority(),
          MucDoPhucTap: document.getElementById("taskComplexity").value ? parseInt(document.getElementById("taskComplexity").value) : null,
          MucDoTapTrung: document.getElementById("taskFocusLevel").value ? parseInt(document.getElementById("taskFocusLevel").value) : null,
          ThoiDiemThichHop: (() => { const v = document.getElementById("taskSuitableTime").value; return v && v.trim() !== "" ? v : null; })(),
          LuongTheoGio: parseInt(document.getElementById("taskHourlyWage").value) || 0,
          CoThoiGianCoDinh: document.getElementById("taskFixedTime").checked,
          Tag: getTagsFromInput().join(","),
          MaLoai: getSelectedCategoryId(),
        };

        if (!formData.TieuDe) { showNotification("Vui lòng nhập tiêu đề công việc", "error"); throw new Error("Title is required"); }

        const complexityValue = document.getElementById("taskComplexity").value;
        const focusValue = document.getElementById("taskFocusLevel").value;
        const timeValue = document.getElementById("taskSuitableTime").value;
        if (!complexityValue || !focusValue || !timeValue) {
          const incompleteFields = [];
          if (!complexityValue) incompleteFields.push("Mức độ phức tạp");
          if (!focusValue) incompleteFields.push("Mức độ tập trung");
          if (!timeValue) incompleteFields.push("Thời điểm thích hợp");
          const ok = await showConfirmDialog("Cảnh báo dữ liệu không đầy đủ",
            `<div style="text-align:left"><p>Bạn chưa điền: <strong>${incompleteFields.join(", ")}</strong></p><p style="color:#b45309;font-size:13px;margin-top:8px">AI có thể không đề xuất chính xác nếu thiếu thông tin này.</p><p style="margin-top:12px;font-weight:500">Vẫn muốn tiếp tục?</p></div>`);
          if (!ok) { showNotification("Hãy điền đầy đủ các trường để tối ưu hóa AI tư vấn", "info"); throw new Error("User cancelled"); }
        }

        let fixedDateKeys = [];
        let fixedStartHM = "";
        let fixedDurationMin = 60;
        let repeatVal = "";

        if (formData.CoThoiGianCoDinh) {
          fixedStartHM = document.getElementById("taskFixedStartHour").value;
          if (!fixedStartHM) { showNotification("Vui lòng chọn giờ bắt đầu", "error"); throw new Error("Missing start time"); }
          fixedDurationMin = parseInt(document.getElementById("taskFixedDuration").value) || 60;
          if (fixedDurationMin <= 0) { showNotification("Thời lượng phải lớn hơn 0", "error"); throw new Error("Invalid duration"); }
          fixedDateKeys = FixedDates.getSelectedKeys();
          if (fixedDateKeys.length === 0) { showNotification("Vui lòng chọn ít nhất một ngày", "error"); throw new Error("Missing dates"); }
          repeatVal = document.getElementById("taskRepeatOption").value || "";

          // Primary date = first selected date; used for edit mode + task template.
          const primaryStart = buildLocalIso(fixedDateKeys[0], fixedStartHM);
          const primaryStartDate = new Date(primaryStart);
          const primaryEndDate = new Date(primaryStartDate.getTime() + fixedDurationMin * 60000);
          formData.GioBatDauCoDinh = primaryStart;
          formData.GioKetThucCoDinh = `${fixedDateKeys[0]}T${minutesToHM(hmToMinutes(fixedStartHM) + fixedDurationMin)}:00`;
          formData.ThoiGianUocTinh = fixedDurationMin;
          if (repeatVal) formData.LapLai = repeatVal;
        }

        if (isEditing) {
          await handleUpdateTaskForm(window.currentEditingTaskId, formData);
        } else {
          const token = localStorage.getItem("auth_token");
          if (!token) { showNotification("Vui lòng đăng nhập lại", "error"); throw new Error("No auth token"); }

          // Build one payload per selected date for fixed-time tasks; otherwise single POST.
          const payloads = formData.CoThoiGianCoDinh && fixedDateKeys.length > 0
            ? fixedDateKeys.map((k) => ({
                ...formData,
                GioBatDauCoDinh: buildLocalIso(k, fixedStartHM),
                GioKetThucCoDinh: `${k}T${minutesToHM(hmToMinutes(fixedStartHM) + fixedDurationMin)}:00`,
              }))
            : [formData];

          const results = await Promise.all(
            payloads.map((p) =>
              fetch("/api/tasks", {
                method: "POST",
                headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
                body: JSON.stringify(p),
              }).then((r) => r.json()).catch(() => ({ success: false, message: "Lỗi mạng" }))
            )
          );

          const succeeded = results.filter((r) => r.success);
          const failed = results.length - succeeded.length;

          if (succeeded.length > 0) {
            const msg = payloads.length > 1
              ? `Tạo ${succeeded.length}/${payloads.length} công việc thành công!`
              : "Tạo công việc thành công!";
            showNotification(msg, failed ? "info" : "success");
            window.WorkManager?.showSuccessOverlay?.("Tạo mới thành công!");
            triggerModalSidebarRefresh();
            closeMainModal();
            form.reset(); setPriority("2");
            document.getElementById("taskFixedTime").checked = false;
            document.getElementById("fixedTimeFields")?.classList.add("hidden");
            FixedDates.reset();
            window.WorkManager?.reload?.();
            window.dispatchEvent(new CustomEvent("taskCreated", { detail: { task: succeeded[0].data } }));
          } else {
            showNotification(results[0]?.message || "Lỗi khi tạo công việc", "error");
          }
        }
      } catch (error) {
        if (!error.message.includes("Title is required") && !error.message.includes("Missing start time") && !error.message.includes("User cancelled")) {
          showNotification("Lỗi kết nối máy chủ", "error");
        }
      } finally {
        if (submitText && submitLoading) {
          submitText.classList.remove("hidden");
          submitLoading.classList.add("hidden");
          if (submitBtn) submitBtn.disabled = false;
        }
      }
    });
  }

  // ===== Fixed time toggle =====
  function handleFixedTimeToggle() {
    const fixedTimeCheckbox = document.getElementById("taskFixedTime");
    const fixedTimeFields = document.getElementById("fixedTimeFields");
    const startHour = document.getElementById("taskFixedStartHour");
    const endHour = document.getElementById("taskFixedEndHour");
    const duration = document.getElementById("taskFixedDuration");

    if (fixedTimeCheckbox) {
      fixedTimeCheckbox.addEventListener("change", function () {
        fixedTimeFields?.classList.toggle("hidden", !this.checked);
        if (this.checked) {
          FixedDates.render();
          FixedDates.bind();
        }
      });
    }
    startHour?.addEventListener("change", recalcEndFromDuration);
    duration?.addEventListener("input", recalcEndFromDuration);
    endHour?.addEventListener("change", recalcDurationFromEnd);

    const createCategoryBtn = document.getElementById("createNewCategoryBtn");
    if (!createCategoryBtn) return;
    createCategoryBtn.addEventListener("click", function (e) {
      e.preventDefault(); e.stopPropagation();
      if (window.ModalManager?.showModalById) {
        ModalManager.showModalById("createCategoryModal");
      } else if (window.openCategoryModal) {
        window.openCategoryModal();
      }
    });
  }

  // Build ISO "YYYY-MM-DDTHH:MM:SS" in local time (no Z) — Supabase will treat as UTC,
  // but we keep the wall-clock value the user picked.
  function buildLocalIso(dateKey, hm) {
    return `${dateKey}T${hm}:00`;
  }

  // ===== Load task into form (edit mode) =====
  function loadTaskDataIntoForm(taskData) {
    const modalTitle = document.querySelector("#createTaskModalContent h2");
    if (modalTitle) modalTitle.textContent = "Chỉnh sửa công việc";
    const submitBtn = document.querySelector("#createTaskForm button[type='submit'] .submit-text");
    if (submitBtn) submitBtn.innerHTML = "Cập nhật";

    if (taskData.TieuDe) document.getElementById("taskTitle").value = taskData.TieuDe;
    if (taskData.MoTa) document.getElementById("taskDescription").value = taskData.MoTa;
    if (taskData.ThoiGianUocTinh) document.getElementById("taskDuration").value = taskData.ThoiGianUocTinh;
    if (taskData.MucDoUuTien) setPriority(taskData.MucDoUuTien);
    if (taskData.MucDoPhucTap) document.getElementById("taskComplexity").value = taskData.MucDoPhucTap;
    if (taskData.MucDoTapTrung) document.getElementById("taskFocusLevel").value = taskData.MucDoTapTrung;
    if (taskData.ThoiDiemThichHop) document.getElementById("taskSuitableTime").value = taskData.ThoiDiemThichHop;
    if (taskData.LuongTheoGio) document.getElementById("taskHourlyWage").value = taskData.LuongTheoGio;
    if (taskData.Tag) document.getElementById("taskTag").value = taskData.Tag;

    if (taskData.MaLoai) {
      setTimeout(() => {
        const r = document.querySelector(`input[name="taskCategory"][value="${taskData.MaLoai}"]`);
        if (r) r.checked = true;
      }, 500);
    }

    if (taskData.CoThoiGianCoDinh) {
      document.getElementById("taskFixedTime").checked = true;
      document.getElementById("fixedTimeFields")?.classList.remove("hidden");
      if (taskData.GioBatDauCoDinh) {
        const s = new Date(taskData.GioBatDauCoDinh);
        const sHM = `${String(s.getHours()).padStart(2, "0")}:${String(s.getMinutes()).padStart(2, "0")}`;
        document.getElementById("taskFixedStartHour").value = sHM;
        FixedDates.setSelectedKeys([FixedDates._dateKey(s)]);
        FixedDates._cursor = new Date(s.getFullYear(), s.getMonth(), 1);
      }
      if (taskData.GioKetThucCoDinh) {
        const e = new Date(taskData.GioKetThucCoDinh);
        document.getElementById("taskFixedEndHour").value = `${String(e.getHours()).padStart(2, "0")}:${String(e.getMinutes()).padStart(2, "0")}`;
        recalcDurationFromEnd();
      }
      if (taskData.LapLai) document.getElementById("taskRepeatOption").value = taskData.LapLai;
      FixedDates.render();
      FixedDates.bind();
    }

    window.currentEditingTaskId = taskData.MaCongViec || taskData.ID;
  }

  // ===== Main init =====
  function initCreateTaskModal() {
    if (window._createTaskModalInitialized) return;
    window._createTaskModalInitialized = true;

    loadCategoriesForModal();
    handleCreateTaskForm();
    handleFixedTimeToggle();

    const closeBtn = document.getElementById("closeCreateTaskBtn");
    const cancelBtn = document.getElementById("cancelCreateTaskBtn");
    const modalOverlay = document.querySelector(".modal-overlay[data-modal-close]");

    if (closeBtn) closeBtn.addEventListener("click", () => { resetFormToCreateMode(); closeMainModal(); });
    if (cancelBtn) cancelBtn.addEventListener("click", () => { resetFormToCreateMode(); closeMainModal(); });
    if (modalOverlay) modalOverlay.addEventListener("click", () => { resetFormToCreateMode(); closeMainModal(); });

    document.addEventListener("modalClosed", function (e) {
      if (e.detail?.modalId === "createTaskModal") resetFormToCreateMode();
    });

    // Default time = next whole hour, duration 60min.
    const startHour = document.getElementById("taskFixedStartHour");
    const duration = document.getElementById("taskFixedDuration");
    if (startHour) {
      const now = new Date();
      now.setHours(now.getHours() + 1, 0, 0, 0);
      startHour.value = `${String(now.getHours()).padStart(2, "0")}:00`;
      if (duration) duration.value = "60";
      recalcEndFromDuration();
    }

    // Default date = today, render mini calendar.
    FixedDates.reset();
    FixedDates.render();
    FixedDates.bind();
  }

  // ===== Global exports =====
  window.initCreateTaskModal = initCreateTaskModal;
  window.loadCategoriesForModal = loadCategoriesForModal;
  window.showNotification = showNotification;
  window.loadTaskDataIntoForm = loadTaskDataIntoForm;

  window.closeCategoryModal = function () {
    const modal = document.getElementById("createCategoryModal");
    if (!modal) return;
    modal.classList.add("hidden");
    modal.style.display = "none";
    document.getElementById("createCategoryForm")?.reset();
    document.body.style.overflow = "";
  };

  window.openCategoryModal = function () {
    const modal = document.getElementById("createCategoryModal");
    if (!modal) return;
    modal.classList.remove("hidden");
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
  };

  // ===== Auto-init triggers =====
  document.addEventListener("modalOpened", e => {
    if (e.detail?.modalId === "createTaskModal") setTimeout(initCreateTaskModal, 100);
  });
  document.addEventListener("modalShown", e => {
    if (e.detail?.modalId === "createTaskModal") setTimeout(initCreateTaskModal, 100);
  });
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", () => setTimeout(initCreateTaskModal, 200));
  } else {
    setTimeout(initCreateTaskModal, 200);
  }
</script>
