<!-- Content-only: the host element #calendar-sidebar on the page already provides
     the flex-column layout. Wrapping with another id="calendar-sidebar" here
     caused duplicate IDs and broke the internal flex height resolution (task list
     scrolled as one block with the mini calendar instead of being pinned). -->

<!-- Mini calendar — pinned at top, no shrink -->
<div id="mini-cal-container" class="flex-shrink-0"></div>

<!-- Section heading -->
<div class="p-3 border-b flex-shrink-0" style="border-color:#e2e8f0">
  <h3 class="font-semibold text-base text-gray-800 flex items-center justify-between">
    Công việc của tôi
    <button
      id="refresh-tasks-btn"
      class="text-sm transition-transform duration-300 hover:rotate-180"
      style="color:var(--apple-blue)"
    >
      <i class="fas fa-sync-alt"></i>
    </button>
  </h3>
  <p class="text-xs text-gray-500 mt-1">Kéo thả vào lịch để lên kế hoạch</p>
</div>

<!-- Scrollable task list — only region that scrolls -->
<div class="flex-1 overflow-y-auto overflow-x-hidden p-3" id="task-list" style="min-height:0">
  <div class="text-center text-gray-500 py-8" id="empty-tasks">
    <div class="animate-pulse">Đang tải công việc...</div>
  </div>
</div>

<script>
  (function () {

    window.loadUserTasks = async function (forceRefresh = false) {
      const container = document.getElementById("task-list");
      if (!container) {
        return;
      }

      try {
        container.innerHTML = `
      <div class="text-center py-8">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
        <p class="mt-2 text-gray-500">Đang tải công việc...</p>
      </div>
    `;

        const url = forceRefresh ? `/api/tasks?t=${Date.now()}` : "/api/tasks";

        const result = await Utils.makeRequest(url, "GET");

        if (!result.success) {
          throw new Error(result.message || "Lỗi tải công việc");
        }

        const allTasks = result.data || [];

        const pendingTasks = allTasks.filter((task) => {
          const status =
            task.TrangThaiThucHien || task.Status || task.DaHoanThanh || 0;
          return status !== 2 && status !== "completed" && status !== "done";
        });


        container.innerHTML = "";

        if (pendingTasks.length === 0) {
          container.innerHTML = `
        <div class="text-center text-gray-500 py-8">
          <i class="fas fa-tasks text-4xl mb-3 text-gray-300"></i>
          <p class="font-medium">Không có công việc nào</p>
          <p class="text-sm mt-1">Chuyển sang tab "Công việc" để tạo mới</p>
        </div>`;
          return;
        }

        // Single source of truth: PriorityTheme reads from CSS vars (--prio-1..4).
        const getPriorityColor = (priority) =>
          window.PriorityTheme ? PriorityTheme.getColor(priority) : "#3B82F6";

        // Render từng task (giữ nguyên phần render)
        // Build task items via DocumentFragment — single DOM write, no per-item reflow.
        const frag = document.createDocumentFragment();
        pendingTasks.forEach((task, index) => {
          const taskId = task.MaCongViec || task.ID || task.id;
          const title = task.TieuDe || task.Title || `Công việc ${index + 1}`;
          const description = task.MoTa || task.Description || "";
          const priority = parseInt(task.MucDoUuTien || task.Priority || 2);
          const color = getPriorityColor(priority);
          const tag = task.Tag || task.Category || "";

          const taskElement = document.createElement("div");
          taskElement.className = "task-item";
          taskElement.style.borderLeftColor = color;

          taskElement.dataset.taskId = taskId;
          taskElement.dataset.taskTitle = title;
          taskElement.dataset.taskDescription = description;
          taskElement.dataset.taskColor = color;
          taskElement.dataset.taskPriority = priority;
          taskElement.dataset.taskDuration = task.ThoiGianUocTinh || 60;
          if (task.CoThoiGianCoDinh) {
            taskElement.dataset.hasFixedTime = "true";
            taskElement.dataset.fixedStart = task.GioBatDauCoDinh || "";
            taskElement.dataset.fixedEnd = task.GioKetThucCoDinh || "";
          }

          // Fixed-time badge
          let fixedBadge = "";
          const durMin = parseInt(task.ThoiGianUocTinh || 60, 10);
          if (task.CoThoiGianCoDinh && task.GioBatDauCoDinh) {
            const s = new Date(task.GioBatDauCoDinh);
            const hh = String(s.getHours()).padStart(2, "0");
            const mm = String(s.getMinutes()).padStart(2, "0");
            const dd = String(s.getDate()).padStart(2, "0");
            const mo = String(s.getMonth() + 1).padStart(2, "0");
            fixedBadge = `<span class="task-item-tag task-item-tag-time">
              <i class="far fa-clock"></i> ${hh}:${mm} · ${dd}/${mo} · ${durMin}'
            </span>`;
          }

          // Category tag
          const categoryTag = tag
            ? `<span class="task-item-tag task-item-tag-cat">
                <i class="fas fa-folder"></i> ${tag}
              </span>`
            : "";

          // Duration tag (shown when no fixed time)
          const durationTag = !fixedBadge
            ? `<span class="task-item-tag task-item-tag-dur">
                <i class="far fa-hourglass"></i> ${durMin} phút
              </span>`
            : "";

          taskElement.innerHTML = `
            <div class="task-item-grip"><i class="fas fa-grip-vertical"></i></div>
            <div class="task-item-body">
              <div class="task-item-title">${title}</div>
              ${description ? `<div class="task-item-desc">${description}</div>` : ""}
              <div class="task-item-tags">
                ${fixedBadge}
                ${durationTag}
                ${categoryTag}
              </div>
            </div>
          `;

          frag.appendChild(taskElement);
        });
        container.appendChild(frag);

        // FC.Draggable uses a single container-level instance with event delegation,
        // so we just ensure it's initialized once after the list mounts.
        if (window.CalendarModule?.setupExternalDraggable) {
          window.CalendarModule.setupExternalDraggable();
        }
      } catch (error) {

        const container = document.getElementById("task-list");
        if (container) {
          container.innerHTML = `
        <div class="text-center text-red-600 py-8">
          <i class="fas fa-exclamation-circle text-2xl mb-3"></i>
          <p class="font-medium">Lỗi tải công việc</p>
          <p class="text-sm mt-1">${error.message || "Không thể kết nối"}</p>
          <button onclick="window.loadUserTasks(true)"
                  class="mt-3 px-4 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg text-sm font-medium">
            <i class="fas fa-redo mr-2"></i>Thử lại
          </button>
        </div>`;
        }
      }
    };

    window.setupTaskEventListeners = function () {

      window.addEventListener("storage", function (e) {
        if (
          e.key === "task-updated" ||
          e.key === "task-created" ||
          e.key === "task-deleted"
        ) {
          setTimeout(() => window.loadUserTasks(true), 1000);
        }
      });

      document.addEventListener("task-changed", function (e) {
        setTimeout(() => window.loadUserTasks(true), 1000);
      });

      document.addEventListener("taskCreated", function () {
        setTimeout(() => window.loadUserTasks(true), 1000);
      });

      window.addEventListener("message", function (e) {
        if (e.data && e.data.type === "task-update") {
          setTimeout(() => window.loadUserTasks(true), 1000);
        }
      });

      // Note: event-driven refresh only. Previous 3-second polling was removed —
      // it forced reload whenever count changed OR whenever the list rendered empty,
      // causing flicker and backend load. Events (taskCreated/task-changed/storage)
      // cover every real update path.

      document.addEventListener("section-changed", (e) => {
        if (e.detail?.section === "schedule") {
          setTimeout(() => window.loadUserTasks(true), 500);
        }
      });
    };
  })();

  // (Removed enhanceDragAndDrop / handleDragStart / handleDragEnd — replaced by a
  //  single FullCalendar.Draggable on #task-list. See CalendarModule.initializeExternalDraggable.)

  (function initSidebar() {
    setTimeout(() => {
      if (typeof window.loadUserTasks === "function") {
        window.loadUserTasks();
        if (typeof window.setupTaskEventListeners === "function") {
          window.setupTaskEventListeners();
        }
      } else {
        const taskList = document.getElementById("task-list");
        if (taskList) {
          taskList.innerHTML = `
        <div class="text-red-600 text-center py-4">
          <i class="fas fa-exclamation-triangle text-xl mb-2"></i>
          <p>Lỗi khởi tạo sidebar</p>
          <button onclick="location.reload()" class="mt-2 px-3 py-1 bg-red-100 hover:bg-red-200 rounded text-sm">
            Tải lại
          </button>
        </div>`;
        }
      }
    }, 1000);
  })();

  window.triggerSidebarRefresh = function () {

    localStorage.setItem("task-updated", Date.now().toString());
    setTimeout(() => {
      localStorage.removeItem("task-updated");
    }, 100);

    setTimeout(() => {
      if (window.loadUserTasks) {
        window.loadUserTasks(true);
      }
    }, 200);
  };

  document.addEventListener("DOMContentLoaded", () => {
    const refreshBtn = document.getElementById("refresh-tasks-btn");
    if (refreshBtn) {
      refreshBtn.addEventListener("click", () => {
        refreshBtn.classList.add("animate-spin");
        if (window.loadUserTasks) {
          window.loadUserTasks(true).finally(() => {
            setTimeout(() => {
              refreshBtn.classList.remove("animate-spin");
            }, 500);
          });
        }
      });
    }

    // Safety-net refresh every 10 minutes (was 1 minute). Only runs if sidebar visible
    // and no force flag, so cache can serve. Events already handle real-time updates.
    setInterval(() => {
      if (document.getElementById("calendar-sidebar")?.offsetParent !== null) {
        if (window.loadUserTasks) {
          window.loadUserTasks();
        }
      }
    }, 10 * 60 * 1000);
  });

  // (Removed `window.updateSidebarUser = updateUserInfo;` — updateUserInfo is defined in
  //  sidebar.html, not here, so this orphan threw ReferenceError on load and halted the
  //  rest of the script. sidebar.html already exposes the same binding.)

  window.reloadWorkData = function () {
    if (window.WorkManager && typeof WorkManager.loadTasks === "function") {
      WorkManager.loadTasks();
    }
    if (window.loadUserTasks) {
      window.loadUserTasks();
    }
  };

  // (Removed loadUserTasks wrapper — loadUserTasks already calls setupExternalDraggable
  //  after rendering. The FC.Draggable container instance is idempotent.)

</script>


<style>
  /* ========================================================
     Calendar sidebar — Apple-inspired, bigger tappable items
     ======================================================== */

  #calendar-sidebar {
    background: #fff;
    transition: background 0.2s ease, box-shadow 0.2s ease;
    position: relative;
  }

  /* Drag-to-delete visual feedback — sidebar becomes a red trash zone while
     an event is being dragged from the calendar. */
  body.calendar-dragging #calendar-sidebar {
    background: rgba(225, 29, 72, 0.05);
    box-shadow: inset 0 0 0 2px rgba(225, 29, 72, 0.4);
  }
  body.calendar-dragging #calendar-sidebar::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background:
      linear-gradient(135deg, rgba(225, 29, 72, 0.06), rgba(225, 29, 72, 0.02));
    animation: trashPulse 1.2s ease-in-out infinite;
  }
  /* Use emoji (system font) so Vietnamese diacritics render correctly —
     FontAwesome's "Free" font has no Vietnamese glyphs and breaks "Thả để xóa". */
  body.calendar-dragging #calendar-sidebar::after {
    content: "🗑  Thả để xóa";
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
      "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 600;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    padding: 14px 18px;
    background: #e11d48;
    color: #fff;
    font-size: 14px;
    letter-spacing: -0.224px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(225, 29, 72, 0.4);
    pointer-events: none;
    z-index: 6;
    white-space: nowrap;
  }
  @keyframes trashPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  #calendar-sidebar h3 {
    color: var(--text-primary, #1d1d1f);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.24px;
  }

  #calendar-sidebar h3 + p {
    color: var(--text-muted, #94a3b8);
    font-size: 12px;
    letter-spacing: -0.12px;
  }

  #refresh-tasks-btn {
    background: transparent;
    border: 0;
    border-radius: 8px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, color 0.2s ease;
    color: var(--text-muted, #94a3b8);
    cursor: pointer;
  }

  #refresh-tasks-btn:hover {
    background: #f1f5f9;
    color: var(--apple-blue, #0071e3);
  }

  /* ===== TASK LIST CONTAINER ===== */
  #task-list {
    padding: 10px 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Visible Apple-style scrollbar */
  #task-list::-webkit-scrollbar { width: 8px; }
  #task-list::-webkit-scrollbar-track {
    background: transparent;
    margin: 4px 0;
  }
  #task-list::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.18);
    border-radius: 4px;
    border: 2px solid #fff;
    background-clip: padding-box;
  }
  #task-list::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 0, 0, 0.32);
    border: 2px solid #fff;
    background-clip: padding-box;
  }

  /* ===== TASK ITEM — bigger, readable, clear drag affordance ===== */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: #fff;
    border-radius: 10px;
    padding: 12px 12px 12px 10px;
    border: 1px solid var(--border, rgba(0, 0, 0, 0.08));
    border-left: 4px solid #6366f1; /* priority color override inline */
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    transition: background-color 0.15s ease, border-color 0.15s ease,
                box-shadow 0.15s ease;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }

  .task-item:hover {
    background: #fafafa;
    border-color: rgba(0, 0, 0, 0.14);
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
  }

  .task-item:active,
  .task-item.fc-event-dragging {
    cursor: grabbing;
  }

  /* Grip icon — always visible, bigger */
  .task-item-grip {
    flex-shrink: 0;
    width: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #cbd5e1;
    font-size: 12px;
    margin-top: 2px;
    transition: color 0.15s ease;
  }
  .task-item:hover .task-item-grip {
    color: var(--apple-blue, #0071e3);
  }

  /* Body area */
  .task-item-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* Title — 2-line clamp so long names aren't cut off mid-word */
  .task-item-title {
    color: var(--text-primary, #1d1d1f);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.35;
    letter-spacing: -0.224px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  /* Description */
  .task-item-desc {
    color: var(--text-secondary, rgba(0, 0, 0, 0.64));
    font-size: 12px;
    line-height: 1.35;
    letter-spacing: -0.12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Tags row — wraps so multiple tags don't overflow */
  .task-item-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 3px;
  }

  .task-item-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: -0.08px;
    line-height: 1;
    white-space: nowrap;
  }

  .task-item-tag i { font-size: 10px; }

  .task-item-tag-time {
    background: rgba(0, 113, 227, 0.1);
    color: var(--apple-blue, #0071e3);
  }
  .task-item-tag-dur {
    background: rgba(99, 102, 241, 0.1);
    color: #4f46e5;
  }
  .task-item-tag-cat {
    background: #f1f5f9;
    color: #475569;
  }

  /* ===== EMPTY / LOADING / ERROR STATES ===== */
  #task-list .text-center {
    padding: 48px 16px;
    text-align: center;
  }
  #task-list .text-center .fas.fa-inbox,
  #task-list .text-center .fas.fa-tasks {
    font-size: 40px;
    color: #cbd5e1;
    opacity: 0.7;
    margin-bottom: 12px;
    display: block;
  }
  #task-list .text-center p {
    font-size: 13px;
    color: var(--text-secondary, #64748b);
    margin: 4px 0;
    letter-spacing: -0.12px;
  }

  #task-list .animate-pulse {
    padding: 40px 16px;
    text-align: center;
  }
  #task-list .animate-pulse .inline-block {
    width: 36px;
    height: 36px;
    border: 3px solid #e2e8f0;
    border-top-color: var(--apple-blue, #0071e3);
    border-radius: 50%;
    animation: task-spin 0.9s linear infinite;
  }
  @keyframes task-spin { to { transform: rotate(360deg); } }
  #task-list .animate-pulse p {
    margin-top: 10px;
    color: var(--text-secondary, #64748b);
    font-size: 13px;
  }

  /* ===== DARK MODE ===== */
  body.dark #calendar-sidebar { background: var(--bg-card); }
  body.dark .task-item {
    background: var(--bg-card-alt);
    border-color: var(--border);
  }
  body.dark .task-item:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-hover);
  }
  body.dark .task-item-title { color: var(--text-primary); }
  body.dark .task-item-desc { color: var(--text-secondary); }
  body.dark .task-item-tag-cat {
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-secondary);
  }
  body.dark #task-list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-color: var(--bg-card);
  }
</style>
