<div
  class="flex flex-col h-full"
  style="width:224px;flex-shrink:0;background:var(--np-bg-card,#faf7f2);border-right:1px solid var(--np-border-muted,#c8b99a)"
  id="calendar-sidebar"
>
  <!-- Mini calendar rendered here by CalendarModule.initMiniCalendar() -->
  <div id="mini-cal-container" class="flex-shrink-0"></div>

  <div class="p-3" style="border-bottom:1px solid var(--np-border-muted,#c8b99a)">
    <h3
      class="flex items-center justify-between"
      style="font-family:var(--np-font-heading,'Playfair Display',Georgia,serif);font-weight:700;font-size:15px;color:var(--np-text,#1a1a1a)"
    >
      Công việc của tôi
      <button
        id="refresh-tasks-btn"
        class="text-sm hover:rotate-180 transition-transform duration-300"
        style="color:var(--np-accent,#8b0000)"
        title="Làm mới"
      >
        Tải lại
      </button>
    </h3>
    <p class="text-xs mt-1" style="color:var(--np-text-muted,#6b5f4a);font-family:var(--np-font-body,'Merriweather',serif)">Kéo thả vào lịch để lên kế hoạch</p>
  </div>

  <div class="flex-1 overflow-y-auto p-4" id="task-list">
    <div class="text-center text-gray-500 py-8" id="empty-tasks">
      <div class="animate-pulse">Đang tải công việc...</div>
    </div>
  </div>
</div>

<script>
  (function () {
    console.log(" Calendar sidebar loaded");

    window.loadUserTasks = async function (forceRefresh = false) {
      console.log(
        "🔄 Loading user tasks for sidebar...",
        forceRefresh ? "(force refresh)" : ""
      );

      const container = document.getElementById("task-list");
      if (!container) {
        console.error(" Task list container not found");
        return;
      }

      try {
        container.innerHTML = `
      <div class="text-center py-8">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        <p class="mt-2 text-gray-500">Đang tải công việc...</p>
      </div>
    `;

        const url = forceRefresh ? `/api/tasks?t=${Date.now()}` : "/api/tasks";

        const result = await Utils.makeRequest(url, "GET");

        if (!result.success) {
          throw new Error(result.message || "Lỗi tải công việc");
        }

        const allTasks = result.data || [];
        console.log(` Loaded ${allTasks.length} tasks from API`);

        const pendingTasks = allTasks.filter((task) => {
          const status =
            task.TrangThaiThucHien || task.Status || task.DaHoanThanh || 0;
          return status !== 2 && status !== "completed" && status !== "done";
        });

        console.log(` Pending tasks: ${pendingTasks.length}`);

        container.innerHTML = "";

        if (pendingTasks.length === 0) {
          container.innerHTML = `
        <div class="text-center text-gray-500 py-8">
          <p class="font-medium">Không có công việc nào</p>
          <p class="text-sm mt-1">Chuyển sang tab "Công việc" để tạo mới</p>
        </div>`;
          return;
        }

        //  HELPER: Hàm lấy màu theo độ ưu tiên
        const getPriorityColor = (priority) => {
          const colors = {
            1: "#34D399", // Xanh lá - Low
            2: "#60A5FA", // Xanh dương - Normal
            3: "#FBBF24", // Vàng - High
            4: "#F87171", // Đỏ - Urgent
          };
          return colors[priority] || "#60A5FA"; // Mặc định Normal (2)
        };

        // Render từng task (giữ nguyên phần render)
        pendingTasks.forEach((task, index) => {
          const taskId = task.MaCongViec || task.ID || task.id;
          const title = task.TieuDe || task.Title || `Công việc ${index + 1}`;
          const description = task.MoTa || task.Description || "";
          const priority = parseInt(task.MucDoUuTien || task.Priority || 2);
          const color = getPriorityColor(priority); //  Lấy màu từ priority thay vì MauSac
          const tag = task.Tag || task.Category || "";

          const taskElement = document.createElement("div");
          taskElement.className =
            "task-item mb-1.5 rounded-lg bg-white border border-gray-200 cursor-move transition-all";
          taskElement.style.borderLeft = `4px solid ${color}`;
          taskElement.style.background = `linear-gradient(135deg, ${color}15, ${color}08)`;
          taskElement.draggable = true;

          taskElement.dataset.taskId = taskId;
          taskElement.dataset.taskTitle = title;
          taskElement.dataset.taskDescription = description;
          taskElement.dataset.taskColor = color;
          taskElement.dataset.taskPriority = priority;
          taskElement.dataset.taskDuration = task.ThoiGianUocTinh || 60; // Thêm độ dài ước tính (phút)
          taskElement.dataset.dragInitialized = "true";

          taskElement.innerHTML = `
    <div class="flex items-center gap-2">
      <div class="text-gray-300 flex-shrink-0" style="font-size:10px;letter-spacing:1px" aria-hidden="true"></div>
      <div class="flex-1 min-w-0">
        <div class="font-medium text-gray-800 truncate text-xs leading-snug">${title}</div>
        ${tag ? `<span class="text-gray-400 text-xs">${tag}</span>` : '<span class="text-gray-400 text-xs">Kéo vào lịch</span>'}
      </div>
    </div>
  `;

          taskElement.addEventListener("dragstart", (e) => {
            console.log(
              `🎯 Drag start: ${title} (ID: ${taskId}, Priority: ${priority}, Duration: ${task.ThoiGianUocTinh}min, Color: ${color})`
            );
            e.dataTransfer.setData("text/plain", taskId.toString());
            e.dataTransfer.setData(
              "application/json",
              JSON.stringify({
                taskId,
                title,
                color,
                description,
                priority,
                duration: task.ThoiGianUocTinh || 60,
              })
            );
            e.dataTransfer.effectAllowed = "move";
            taskElement.classList.add("opacity-50", "bg-blue-50");
          });

          taskElement.addEventListener("dragend", () => {
            console.log("🔄 Drag ended");
            taskElement.classList.remove("opacity-50", "bg-blue-50");
          });

          container.appendChild(taskElement);
        });

        console.log(` Rendered ${pendingTasks.length} tasks in sidebar`);

        enhanceDragAndDrop();

        setTimeout(() => {
          if (
            window.CalendarModule &&
            typeof CalendarModule.setupExternalDraggable === "function"
          ) {
            console.log("Re-setup external draggable after task reload");
            CalendarModule.setupExternalDraggable();
          }
          if (
            window.CalendarModule &&
            typeof CalendarModule.setupNativeDragDrop === "function"
          ) {
            CalendarModule.setupNativeDragDrop();
          }
        }, 200);
      } catch (error) {
        console.error(" Error loading tasks in sidebar:", error);

        const container = document.getElementById("task-list");
        if (container) {
          container.innerHTML = `
        <div class="text-center text-red-600 py-8">
          <p class="font-medium">Lỗi tải công việc</p>
          <p class="text-sm mt-1">${error.message || "Không thể kết nối"}</p>
          <button onclick="window.loadUserTasks(true)"
                  class="mt-3 px-4 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg text-sm font-medium">
            Thử lại
          </button>
        </div>`;
        }
      }
    };

    window.setupTaskEventListeners = function () {
      console.log(" Setting up global task event listeners");

      window.addEventListener("storage", function (e) {
        if (
          e.key === "task-updated" ||
          e.key === "task-created" ||
          e.key === "task-deleted"
        ) {
          console.log("📢 Storage event detected:", e.key);
          setTimeout(() => window.loadUserTasks(true), 1000);
        }
      });

      document.addEventListener("task-changed", function (e) {
        console.log("📢 Custom task-changed event received:", e.detail);
        setTimeout(() => window.loadUserTasks(true), 1000);
      });

      document.addEventListener("taskCreated", function () {
        console.log("📢 Task created → force reload sidebar");
        setTimeout(() => window.loadUserTasks(true), 1000);
      });

      window.addEventListener("message", function (e) {
        if (e.data && e.data.type === "task-update") {
          console.log("📢 Message event received:", e.data.type);
          setTimeout(() => window.loadUserTasks(true), 1000);
        }
      });

      // Removed aggressive 3-second polling that re-fetched on every count change.
      // Tasks reload via: taskCreated/task-changed events + section-changed event + manual refresh btn.
      // A slow 5-minute background refresh handles stale data without hammering the API.
      setInterval(() => {
        if (document.getElementById("calendar-sidebar")?.offsetParent !== null) {
          window.loadUserTasks();
        }
      }, 5 * 60 * 1000);

      document.addEventListener("section-changed", (e) => {
        if (e.detail?.section === "schedule") {
          console.log("Switched to Schedule tab → reload sidebar tasks");
          setTimeout(() => window.loadUserTasks(true), 500);
        }
      });
    };
  })();

  function enhanceDragAndDrop() {
    console.log(" Enhancing drag and drop for tasks...");
    const taskItems = document.querySelectorAll(".task-item");
    taskItems.forEach((item) => {
      if (item.dataset.dragInitialized !== "true") {
        item.addEventListener("dragstart", handleDragStart);
        item.addEventListener("dragend", handleDragEnd);
        item.dataset.dragInitialized = "true";
        console.log(` Drag enabled for task: ${item.dataset.taskTitle}`);
      }
    });
  }

  (function initSidebar() {
    console.log(" Calendar sidebar loaded - Initializing tasks...");
    setTimeout(() => {
      if (typeof window.loadUserTasks === "function") {
        console.log("🔄 Auto-loading tasks for sidebar...");
        window.loadUserTasks();
        if (typeof window.setupTaskEventListeners === "function") {
          window.setupTaskEventListeners();
        }
      } else {
        console.error(" loadUserTasks function not found!");
        const taskList = document.getElementById("task-list");
        if (taskList) {
          taskList.innerHTML = `
        <div class="text-red-600 text-center py-4">
          <p>Lỗi khởi tạo sidebar</p>
          <button onclick="location.reload()" class="mt-2 px-3 py-1 bg-red-100 hover:bg-red-200 rounded text-sm">
            Tải lại
          </button>
        </div>`;
        }
      }
    }, 1000);
  })();

  window.triggerSidebarRefresh = function () {
    console.log("📢 Manual sidebar refresh triggered");

    localStorage.setItem("task-updated", Date.now().toString());
    setTimeout(() => {
      localStorage.removeItem("task-updated");
    }, 100);

    setTimeout(() => {
      if (window.loadUserTasks) {
        window.loadUserTasks(true);
      }
    }, 200);
  };

  function handleDragStart(e) {
    const taskId = this.dataset.taskId;
    const taskTitle = this.dataset.taskTitle || "Công việc";
    const priority = parseInt(this.dataset.taskPriority) || 2; //  Lấy priority

    const dragPreview = this.cloneNode(true);
    dragPreview.classList.add("task-item-drag-preview");
    dragPreview.style.width = `${this.offsetWidth}px`;
    document.body.appendChild(dragPreview);

    e.dataTransfer.setDragImage(dragPreview, 20, 20);

    e.dataTransfer.setData("text/plain", taskId);
    e.dataTransfer.setData(
      "application/json",
      JSON.stringify({
        taskId: taskId,
        title: taskTitle,
        color: this.dataset.taskColor || "#3B82F6",
        description: this.dataset.taskDescription || "",
        priority: priority, //  Thêm priority
      })
    );
    e.dataTransfer.effectAllowed = "move";

    this.classList.add("dragging", "dragging-task");

    setTimeout(() => {
      if (dragPreview.parentNode) {
        dragPreview.parentNode.removeChild(dragPreview);
      }
    }, 0);

    console.log(`🎯 Bắt đầu kéo: "${taskTitle}" (Priority: ${priority})`);

    if (window.Utils && Utils.showToast) {
      Utils.showToast(`📤 Đang kéo: "${taskTitle}"`, "info");
    }
  }

  function handleDragEnd() {
    this.classList.remove("dragging", "dragging-task");

    document.querySelectorAll(".task-item-drag-preview").forEach((el) => {
      el.parentNode?.removeChild(el);
    });

    console.log("🔄 Kết thúc kéo");
  }

  document.addEventListener("DOMContentLoaded", () => {
    const refreshBtn = document.getElementById("refresh-tasks-btn");
    if (refreshBtn) {
      refreshBtn.addEventListener("click", () => {
        refreshBtn.classList.add("animate-spin");
        if (window.loadUserTasks) {
          window.loadUserTasks(true).finally(() => {
            setTimeout(() => {
              refreshBtn.classList.remove("animate-spin");
            }, 500);
          });
        }
      });
    }

    // Background refresh handled by 5-min interval in setupTaskEventListeners
  });

  // updateUserInfo is defined in sidebar.html — only assign if available
  if (typeof updateUserInfo === 'function') {
    window.updateSidebarUser = updateUserInfo;
  }

  window.reloadWorkData = function () {
    console.log("🔄 reloadWorkData called from sidebar");
    if (window.WorkManager && typeof WorkManager.loadTasks === "function") {
      WorkManager.loadTasks();
    }
    if (window.loadUserTasks) {
      window.loadUserTasks();
    }
  };

  document.addEventListener("taskCreated", () => {
    console.log("Task created → force reload sidebar");
    setTimeout(() => window.loadUserTasks(true), 400);
  });

  const originalLoadUserTasks = window.loadUserTasks;
  window.loadUserTasks = async function (forceRefresh = false) {
    await originalLoadUserTasks(forceRefresh);

    setTimeout(() => {
      {
        if (
          window.CalendarModule &&
          typeof CalendarModule.setupExternalDraggable === "function"
        ) {
          console.log("Re-setup external draggable after task reload");
          CalendarModule.setupExternalDraggable();
        }

        if (
          window.CalendarModule &&
          typeof CalendarModule.setupNativeDragDrop === "function"
        ) {
          CalendarModule.setupNativeDragDrop();
        }
      }
    }, 200);
  };

  document.addEventListener("section-changed", (e) => {
    if (e.detail?.section === "schedule") {
      console.log("Switched to Schedule tab → reload sidebar tasks");
      setTimeout(() => window.loadUserTasks(true), 500);
    }
  });

  console.log("FIXED: Sidebar auto-reload + drag-to-calendar restored");
</script>

    border-radius: 8px;
    width: 32px;

    align-items: center;
    justify-content: center;

    left: 0;

  @keyframes taskSlideIn {
    from {
      opacity: 0;
      transform: translateX(-10px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  .task-item {
    animation: taskSlideIn 0.3s ease-out;
  }

  @keyframes taskSlideOut {

      opacity: 1;
      transform: translateX(0);

    animation: taskSlideOut 0.3s ease-in forwards;
  }

  }

  .task-item.category-personal {

  }

  .task-item.category-meeting {
    border-left-color: #8b5cf6;
  }

  .task-item.category-study {
    border-left-color: #f59e0b;
  }

  .task-item.category-other {
    border-left-color: #94a3b8;
  }

  .task-status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;

  .task-status-dot.pending {
    background: #f59e0b;
