  body.dark #settingsModal .sm-card { background:#162032;border-color:#334155; }

        </div>
        <button class="sm-toggle" id="sidebarThemeToggle" onclick="if(window.ThemeManager){ThemeManager.toggle();updateSidebarThemeToggle();}">
          <span class="sm-toggle-thumb" id="sidebarThemeThumb"></span>
        </button>

        <i class="fas fa-sign-out-alt"></i> Đăng xuất

<script>
  // Move modal out of sidebar-container to avoid overflow:hidden clipping
  (function() {
    const modal = document.getElementById('settingsModal');
    if (modal && modal.closest('#sidebar-container')) {
      document.body.appendChild(modal);
    }
  })();

  function updateSidebarThemeToggle() {
    const isDark = document.body.classList.contains('dark');
    const btn = document.getElementById('sidebarThemeToggle');
    const thumb = document.getElementById('sidebarThemeThumb');
    if (btn) btn.style.background = isDark ? 'var(--accent, #2563EB)' : '#cbd5e1';
    if (thumb) thumb.style.transform = isDark ? 'translateX(20px)' : 'translateX(0)';
  }
  function updateSettingsThemeUI() { updateSidebarThemeToggle(); }
  document.addEventListener('theme-changed', () => updateSidebarThemeToggle());
  updateSidebarThemeToggle();

  function renderAccentPicker() {
    const grid = document.getElementById('accentColorGrid');
    if (!grid) return;
    if (!window.AccentTheme) { setTimeout(renderAccentPicker, 100); return; }
    const current = AccentTheme.get();
    grid.innerHTML = AccentTheme.PRESETS.map(p => {
      const isActive = p.hex.toUpperCase() === current.toUpperCase();
      return `<button style="background:${p.hex} !important;color:${p.hex}" class="${isActive ? 'active' : ''}" onclick="AccentTheme.set('${p.hex}');renderAccentPicker();">
        <span class="swatch-name">${p.name}</span>
        ${isActive ? '<i class="fas fa-check swatch-check"></i>' : ''}
      </button>`;
    }).join('');
  }
  renderAccentPicker();

  (function () {
    const settingsModal = document.getElementById("settingsModal");
    const openBtn = document.getElementById("settingsBtn");
    const closeBtn = document.getElementById("closeSettingsModal");
    const modalLogoutBtn = document.getElementById("modalLogoutBtn");

    function updateUserInfo(user) {
      if (!user) return;
      const name = user.hoten || user.username || "Người dùng";
      const email = user.email || "email@example.com";
      const initial = (user.hoten || user.username || "?").charAt(0).toUpperCase();

      const set = (sel, val) => { const el = document.querySelector(sel); if (el) el.textContent = val; };
      set(".user-name", name);
      set(".user-email", email);
      set(".settings-user-name", name);
      set(".settings-user-email", email);
      set(".settings-avatar-letter", initial);

      const avatarUrl = user.avatarUrl || user.AvatarUrl || localStorage.getItem("user_avatar_url") || localStorage.getItem("user_avatar");
      const container = document.getElementById("sidebarAvatarContainer");
      if (container) {
        if (avatarUrl) {
          container.innerHTML = "";
          container.style.backgroundImage = `url(${avatarUrl})`;
          container.style.backgroundSize = "cover";
          container.style.backgroundPosition = "center";
        } else {
          container.style.backgroundImage = "";
          if (!container.querySelector(".avatar-letter")) {
            const span = document.createElement("span");
            span.className = "avatar-letter";
            span.textContent = initial;
            container.appendChild(span);
          } else {
            container.querySelector(".avatar-letter").textContent = initial;
          }
        }
      }
    }

    // Load immediately (sidebar loads after DOMContentLoaded)
    const userData = localStorage.getItem("user_data");
    if (userData) { try { updateUserInfo(JSON.parse(userData)); } catch (e) {} }

    document.addEventListener("user-avatar-updated", (e) => {
      const container = document.getElementById("sidebarAvatarContainer");
      if (container && e.detail?.url) {
        container.innerHTML = "";
        container.style.backgroundImage = `url(${e.detail.url})`;
        container.style.backgroundSize = "cover";
        container.style.backgroundPosition = "center";
      }
    });

    openBtn?.addEventListener("click", (e) => { e.preventDefault(); settingsModal.classList.remove("hidden"); });
    const closeModal = () => settingsModal.classList.add("hidden");
    closeBtn?.addEventListener("click", closeModal);
    settingsModal?.querySelector(".sm-overlay")?.addEventListener("click", closeModal);
    document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !settingsModal.classList.contains("hidden")) closeModal(); });

    function syncAuthUI() {
      const token = localStorage.getItem('auth_token');
      let isLoggedIn = false;
      if (token) { try { const p = JSON.parse(atob(token.split('.')[1])); isLoggedIn = Date.now() < p.exp * 1000; } catch (e) {} }
      const profileBtn = document.getElementById('sidebarProfileBtn');
      const settBtn = document.getElementById('settingsBtn');
      const toggleIcon = document.getElementById('authToggleIcon');
      const toggleText = document.getElementById('authToggleText');
      const toggleBtn = document.getElementById('sidebarAuthToggleBtn');

      if (profileBtn) profileBtn.style.display = isLoggedIn ? 'flex' : 'none';
      if (settBtn) settBtn.style.display = isLoggedIn ? 'flex' : 'none';
      if (toggleIcon && toggleText && toggleBtn) {
        toggleIcon.className = isLoggedIn ? 'fas fa-sign-out-alt' : 'fas fa-sign-in-alt';
        toggleText.textContent = isLoggedIn ? 'Đăng xuất' : 'Đăng nhập';
        toggleBtn.style.color = isLoggedIn ? '#64748b' : '#94a3b8';
      }
    }
    syncAuthUI();
    document.addEventListener('auth-success', syncAuthUI);
    document.addEventListener('auth-logout', syncAuthUI);

    const doLogout = async () => {
      try { if (typeof Utils !== "undefined") await Utils.makeRequest("/api/auth/logout", "POST"); } catch (e) {}
      localStorage.removeItem("auth_token");
      localStorage.removeItem("token");
      localStorage.removeItem("user_data");
      if (typeof AuthManager !== "undefined") AuthManager.logout();
      else document.dispatchEvent(new CustomEvent('auth-logout'));
      syncAuthUI();
    };

    document.getElementById('sidebarAuthToggleBtn')?.addEventListener('click', async (e) => {
      e.preventDefault();
      if (window.Utils?.isLoggedIn()) { if (!await Utils.confirm("Bạn có chắc chắn muốn đăng xuất?", "Đăng xuất")) return; await doLogout(); }
      else if (window.AuthModalController) { AuthModalController.init(); AuthModalController.open('login'); }
    });

    modalLogoutBtn?.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!await Utils.confirm("Bạn có chắc chắn muốn đăng xuất?", "Đăng xuất")) return;
      await doLogout();
    });

    window.updateSidebarUser = updateUserInfo;

    document.getElementById("sidebarProfileBtn")?.addEventListener("click", (e) => {
      e.preventDefault(); e.stopPropagation();
      const tryOpen = (n = 0) => {
        if (window.ProfileManager?.openProfileModal) { if (!window.ProfileManager.initialized) window.ProfileManager.init(); window.ProfileManager.openProfileModal(); return; }
        if (n > 20) { const m = document.getElementById("profileModal"); if (m) { m.classList.remove("hidden"); m.style.display = "flex"; } return; }
        setTimeout(() => tryOpen(n + 1), 100);
      };
      tryOpen();
    });

    const initNav = setInterval(() => {
      if (window.AppNavigation?.navigateToSection) {
        clearInterval(initNav);
        document.querySelectorAll("[data-section]").forEach((btn) => {
          btn.addEventListener("click", (e) => { e.preventDefault(); AppNavigation.navigateToSection(btn.dataset.section); });
        });
      }
    }, 100);
    setTimeout(() => clearInterval(initNav), 5000);
  })();
</script>
