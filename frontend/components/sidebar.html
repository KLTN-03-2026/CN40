        width:100%;display:flex;align-items:center;gap:10px;

        padding:8px 12px;cursor:pointer;color:var(--np-accent,#8b0000);

<div id="settingsModal" class="modal hidden" style="align-items:center;justify-content:center">
  <div id="settingsModalPanel" class="np-card" style="
    width:380px;max-width:calc(100vw - 2rem);

          <div class="settings-user-email" style="font-family:var(--np-font-ui,'Inter',sans-serif);font-size:0.7rem;color:var(--np-text-muted,#6b5f4a);margin-top:2px">email@example.com</div>
        </div>
      </div>
      <button id="closeSettingsModal" style="
        width:28px;height:28px;border-radius:var(--np-radius,2px);
        background:transparent;border:1px solid var(--np-border-muted,#c8b99a);cursor:pointer;
        display:flex;align-items:center;justify-content:center;
        color:var(--np-text-muted,#6b5f4a);font-size:0.85rem;

      " onmouseover="this.style.background='var(--np-border-muted,#c8b99a)';this.style.borderColor='var(--np-border,#1a1a1a)';this.style.color='var(--np-text,#1a1a1a)'"

    <!-- Scrollable body -->
    <div style="overflow-y:auto;flex:1;padding:0 0 0.5rem">

      <!-- Tài khoản section -->
      <div style="margin-bottom:0.75rem">
        <span style="display:block;font-family:var(--np-font-ui,'Inter',sans-serif);font-size:0.65rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--np-text-muted,#6b5f4a);margin-bottom:0.35rem">Tài khoản</span>

        <button id="openProfileBtn" class="sm-menu-item" style="
          width:100%;display:flex;align-items:center;justify-content:space-between;
          padding:0.45rem 0.5rem;border-radius:var(--np-radius,2px);background:transparent;
          border:none;cursor:pointer;transition:background .12s;text-align:left;
          font-family:var(--np-font-ui,'Inter',sans-serif);font-size:0.85rem;
          color:var(--np-text,#1a1a1a);margin-bottom:2px;
        " onmouseover="this.style.background='var(--np-bg,#f4efe6)'"
           onmouseout="this.style.background='transparent'">
          <span>Cập nhật hồ sơ</span>
          <span style="color:var(--np-text-muted,#6b5f4a)">&#8250;</span>
        </button>

        <button id="openNotificationBtn" class="sm-menu-item" style="
          width:100%;display:flex;align-items:center;justify-content:space-between;
          padding:0.45rem 0.5rem;border-radius:var(--np-radius,2px);background:transparent;
          border:none;cursor:pointer;transition:background .12s;text-align:left;
          font-family:var(--np-font-ui,'Inter',sans-serif);font-size:0.85rem;
          color:var(--np-text,#1a1a1a);
        " onmouseover="this.style.background='var(--np-bg,#f4efe6)'"
           onmouseout="this.style.background='transparent'">
          <span>Thông báo</span>
          <span style="color:var(--np-text-muted,#6b5f4a)">&#8250;</span>
        </button>
      </div>

      <hr style="border:none;border-top:1px solid var(--np-border-muted,#c8b99a);margin:0 0 0.6rem" />

      <!-- Giao diện section -->
      <div style="margin-bottom:0.75rem">
        <span style="display:block;font-family:var(--np-font-ui,'Inter',sans-serif);font-size:0.65rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--np-text-muted,#6b5f4a);margin-bottom:0.35rem">Giao diện</span>

        <div style="display:flex;align-items:center;justify-content:space-between;padding:0.45rem 0.5rem">
          <span style="font-family:var(--np-font-ui,'Inter',sans-serif);font-size:0.85rem;color:var(--np-text,#1a1a1a)">Chế độ tối</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:0.7rem;color:var(--np-text-muted,#6b5f4a)" id="sm-theme-label">Sáng</span>
            <button id="sidebarThemeToggle"
                    onclick="if(window.ThemeManager){ThemeManager.toggle();updateSidebarThemeToggle();updateSettingsThemeUI();}"
                    style="
                      position:relative;width:36px;height:20px;border-radius:10px;
                      background:var(--np-border-muted,#c8b99a);border:1px solid var(--np-border,#1a1a1a);
                      cursor:pointer;transition:background .2s;flex-shrink:0;padding:0;
                    ">
              <span id="sidebarThemeThumb" style="
                position:absolute;top:2px;left:2px;
                width:14px;height:14px;border-radius:50%;
                background:#fff;transition:transform .2s;
              "></span>
            </button>
          </div>
        </div>
      </div>

      <hr style="border:none;border-top:1px solid var(--np-border-muted,#c8b99a);margin:0 0 0.6rem" />

      <!-- Hệ thống section -->
      <div style="margin-bottom:0.5rem">
        <span style="display:block;font-family:var(--np-font-ui,'Inter',sans-serif);font-size:0.65rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--np-text-muted,#6b5f4a);margin-bottom:0.35rem">Hệ thống</span>

        <div style="display:flex;align-items:center;justify-content:space-between;padding:0.45rem 0.5rem">
          <span style="font-family:var(--np-font-ui,'Inter',sans-serif);font-size:0.85rem;color:var(--np-text,#1a1a1a)">Ngôn ngữ</span>
          <span style="font-size:0.72rem;color:var(--np-text-muted,#6b5f4a);font-style:italic">Tiếng Việt</span>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;padding:0.45rem 0.5rem">
          <span style="font-family:var(--np-font-ui,'Inter',sans-serif);font-size:0.85rem;color:var(--np-text,#1a1a1a)">Schedule With AI</span>
          <span style="font-size:0.65rem;font-family:var(--np-font-ui,'Inter',sans-serif);letter-spacing:0.08em;text-transform:uppercase;color:var(--np-text-muted,#6b5f4a)">v1.0.0</span>
        </div>
      </div>

    </div><!-- end scrollable body -->

    <!-- Logout footer -->
    <hr style="border:none;border-top:1px solid var(--np-border-muted,#c8b99a);margin:0.5rem 0" />
    <button id="modalLogoutBtn" style="
      width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
      padding:0.5rem 1rem;border-radius:var(--np-radius,2px);
      border:1.5px solid var(--np-accent,#8b0000);
      background:transparent;cursor:pointer;transition:background .15s;
      color:var(--np-accent,#8b0000);
      font-family:var(--np-font-ui,'Inter',sans-serif);font-size:0.8rem;
      font-weight:500;letter-spacing:0.06em;text-transform:uppercase;
    " onmouseover="this.style.background='var(--np-accent,#8b0000)';this.style.color='#fff'"
       onmouseout="this.style.background='transparent';this.style.color='var(--np-accent,#8b0000)'">
      Đăng xuất
    </button>

  </div>
</div>

<style>
/* Settings modal dark mode */
body.dark #settingsModalPanel {
  background: var(--np-bg-card, #221e19) !important;
  border-color: var(--np-border, #4a4238) !important;
  box-shadow: 4px 4px 0 var(--np-border, #4a4238) !important;
  color: var(--np-text, #e8e0d0) !important;
}
body.dark #settingsModalPanel .settings-user-name { color: var(--np-text, #e8e0d0) !important; }
body.dark #settingsModalPanel .sm-menu-item { color: var(--np-text, #e8e0d0) !important; }
body.dark #settingsModalPanel #sidebarThemeToggle {
  background: var(--np-accent, #c44a4a) !important;
  border-color: var(--np-accent, #c44a4a) !important;
}
body.dark #settingsModalPanel #sidebarThemeThumb { transform: translateX(16px) !important; }
</style>

<script>
  // Theme toggle helper — global so onclick can call it
  function updateSidebarThemeToggle() {
    const isDark = document.body.classList.contains('dark');
    const btn   = document.getElementById('sidebarThemeToggle');
    const thumb = document.getElementById('sidebarThemeThumb');
    const label = document.getElementById('sm-theme-label');
    if (btn)   btn.style.background  = isDark ? 'var(--np-accent,#8b0000)' : 'var(--np-border-muted,#c8b99a)';
    if (thumb) thumb.style.transform = isDark ? 'translateX(16px)' : 'translateX(0)';
    if (label) label.textContent     = isDark ? 'Tối' : 'Sáng';
  }

  // Alias kept for backwards compat (called by theme card buttons which no longer exist but may be in other code)
  function updateSettingsThemeUI() {
    updateSidebarThemeToggle();
  }

  // Sync on theme change event
  document.addEventListener('theme-changed', () => {
    updateSidebarThemeToggle();
    updateSettingsThemeUI();
  });
  // Initial sync (theme.js runs before sidebar loads)
  updateSidebarThemeToggle();
  updateSettingsThemeUI();

  (function () {
    console.log("Sidebar + Settings Modal loaded");

    const settingsModal = document.getElementById("settingsModal");
    const openBtn = document.getElementById("settingsBtn");
    const closeBtn = document.getElementById("closeSettingsModal");
    const modalLogoutBtn = document.getElementById("modalLogoutBtn");

    function updateUserInfo(user) {
      if (!user) return;

      const name  = user.hoten || user.username || "Người dùng";
      const email = user.email || "email@example.com";
      const letter = name.charAt(0).toUpperCase();
      const avatarUrl = user.avatarUrl || user.AvatarUrl || null;

      // Name / email text
      const nameEl  = document.querySelector(".user-name");
      const emailEl = document.querySelector(".user-email");
      if (nameEl)  nameEl.textContent  = name;
      if (emailEl) emailEl.textContent = email;

      // Sidebar mini avatar — image takes priority over letter
      const avatarImgEl    = document.querySelector("#sidebarAvatarWrap .avatar-img");
      const avatarLetterEl = document.querySelector("#sidebarAvatarWrap .avatar-letter");
      if (avatarImgEl && avatarLetterEl) {
        if (avatarUrl && (avatarUrl.startsWith("data:") || avatarUrl.startsWith("http"))) {
          avatarImgEl.src           = avatarUrl;
          avatarImgEl.style.display = "block";
          avatarLetterEl.style.display = "none";
        } else {
          avatarImgEl.src           = "";
          avatarImgEl.style.display = "none";
          avatarLetterEl.style.display = "";
          avatarLetterEl.textContent   = letter;
        }
      } else {
        // Fallback: update all .avatar-letter elements
        document.querySelectorAll(".avatar-letter").forEach((el) => {
          el.textContent = letter;
        });
      }

      // Settings modal user info
      const settingsName  = document.querySelector(".settings-user-name");
      const settingsEmail = document.querySelector(".settings-user-email");
      const settingsLetter = document.querySelector(".settings-avatar-letter");
      if (settingsName)  settingsName.textContent  = name;
      if (settingsEmail) settingsEmail.textContent = email;
      if (settingsLetter) settingsLetter.textContent = letter;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const userData = localStorage.getItem("user_data");
      if (userData) {
        try {
          const user = JSON.parse(userData);
          updateUserInfo(user);
        } catch (e) {
          console.error("Lỗi parse user_data:", e);
        }
      }
    });

    openBtn?.addEventListener("click", (e) => {
      e.preventDefault();
      settingsModal.classList.remove("hidden");
      if (window.ProfileManager && !window.ProfileManager.initialized) {
        console.log("🔧 Initializing ProfileManager from settings modal...");
        window.ProfileManager.init();
      }
      if (
        window.NotificationManager &&
        !window.NotificationManager.initialized
      ) {
        console.log(
          "🔧 Initializing NotificationManager from settings modal..."
        );
        window.NotificationManager.init();
      }
    });

    function bindProfileButton() {
      const btn = document.getElementById("openProfileBtn");
      if (!btn) {
        console.log("⏳ Profile button not ready, retry in 100ms...");
        setTimeout(bindProfileButton, 100);
        return;
      }

      console.log("🔗 Binding profile button...");

      btn.onclick = null;

      btn.onclick = function (e) {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }
        console.log("📋 Profile button clicked!");
        handleOpenProfileModal();
        return false;
      };

      console.log("✅ Profile button bound!");
    }

    function handleOpenProfileModal() {
      console.log("📋 Opening profile modal from settings...");

      closeModal();

      setTimeout(() => {
        const profileModal = document.getElementById("profileModal");

        if (!profileModal) {
          console.error("❌ Profile modal not found in DOM!");
          console.log(
            "Available modals:",
            [...document.querySelectorAll("[id*='Modal']")].map((m) => m.id)
          );
          return;
        }

        console.log("✅ Profile modal found, opening...");

        profileModal.classList.remove("hidden");
        profileModal.classList.add("active", "show");

        profileModal.style.zIndex = "10100";
        profileModal.style.display = "flex";
        profileModal.style.position = "fixed";
        profileModal.style.inset = "0";

        document.body.style.overflow = "hidden";

        if (
          window.ProfileManager &&
          window.ProfileManager.fillFormWithUserData
        ) {
          console.log("📝 Filling form with user data...");
          window.ProfileManager.fillFormWithUserData();
        }

        console.log("✅ Profile modal opened successfully");
      }, 100);
    }

    bindProfileButton();

    setInterval(() => {
      const btn = document.getElementById("openProfileBtn");
      if (btn && !btn.onclick) {
        console.log("🔄 Re-binding profile button (periodic check)...");
        bindProfileButton();
      }
    }, 500);

    const closeModal = () => {
      settingsModal.classList.add("hidden");
    };
    closeBtn?.addEventListener("click", closeModal);
    settingsModal.addEventListener("click", (e) => {
      if (e.target === settingsModal) closeModal();
    });

    const handleLogout = async (e) => {
      e.preventDefault();
      if (!confirm("Bạn có chắc chắn muốn đăng xuất?")) return;

      try {
        if (typeof Utils !== "undefined") {
          await Utils.makeRequest("/api/auth/logout", "POST");
        }
      } catch (err) {}

      localStorage.removeItem("auth_token");
      localStorage.removeItem("token");
      localStorage.removeItem("user_data");

      if (typeof Utils !== "undefined") {
        Utils.showToast("Đã đăng xuất thành công", "success");
      }

      setTimeout(() => (window.location.href = "/login.html"), 800);
    };

    document
      .querySelector("[data-logout]")
      ?.addEventListener("click", handleLogout);
    modalLogoutBtn?.addEventListener("click", handleLogout);

    window.updateSidebarUser = updateUserInfo;

    //  NEW: Open Profile Modal - Work early, before manager init
    const openProfileBtn = document.getElementById("openProfileBtn");
    if (openProfileBtn) {
      openProfileBtn.addEventListener("click", (e) => {
        e.preventDefault();
        // Wait for ProfileManager if not ready yet
        const tryOpen = () => {
          if (window.ProfileManager && ProfileManager.openProfileModal) {
            ProfileManager.openProfileModal();
          } else {
            setTimeout(tryOpen, 100);
          }
        };
        tryOpen();
      });
    }

    //  NEW: Open Notification Modal - Work early, before manager init
    const openNotificationBtn = document.getElementById("openNotificationBtn");
    if (openNotificationBtn) {
      openNotificationBtn.addEventListener("click", (e) => {
        e.preventDefault();
        // Wait for NotificationManager if not ready yet
        const tryOpen = () => {
          if (
            window.NotificationManager &&
            NotificationManager.openNotificationModal
          ) {
            NotificationManager.openNotificationModal();
          } else {
            setTimeout(tryOpen, 100);
          }
        };
        tryOpen();
      });
    }

    // Navigation
    const initNav = setInterval(() => {
      if (window.AppNavigation?.navigateToSection) {
        clearInterval(initNav);
        document.querySelectorAll("[data-section]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.preventDefault();
            AppNavigation.navigateToSection(btn.dataset.section);
          });
        });
      }
    }, 100);
    setTimeout(() => clearInterval(initNav), 5000);

    // Sidebar is always 240px expanded — no collapse/expand logic needed

    // ── Sidebar profile button → open profileModal ────────────────────────
    const sidebarProfileBtn = document.getElementById('sidebarProfileBtn');
    if (sidebarProfileBtn) {
      sidebarProfileBtn.addEventListener('click', (e) => {
        e.preventDefault();
        // Use ModalManager if available
        if (window.ModalManager && window.ModalManager.showModalById) {
          window.ModalManager.showModalById('profileModal');
          // Fill form with user data
          setTimeout(() => {
            if (window.ProfileManager?.fillFormWithUserData) {
              window.ProfileManager.fillFormWithUserData();
            }
          }, 100);
        } else {
          // Fallback: show directly
          const pm = document.getElementById('profileModal');
          if (pm) {
            pm.classList.remove('hidden');
            pm.classList.add('active', 'show');
            pm.style.zIndex = '10100';
            document.body.style.overflow = 'hidden';
          }
        }
      });
    }
  })();
</script>
