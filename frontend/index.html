<!DOCTYPE html>
<html lang="vi">
  <style>
    #sidebar-container,
    #sidebar-container * {
      box-sizing: border-box !important;
    }

    /* Sidebar always 240px expanded */
    #sidebar-container {
      position: fixed !important;
      left: 0 !important;
      top: 0 !important;
      width: 240px !important;
      min-width: 240px !important;
      height: 100vh !important;
      overflow: hidden !important;
      z-index: 999 !important;
    }

    #sidebar-container aside {
      position: relative !important;
      left: 0 !important;
      right: 0 !important;
      top: 0 !important;
      margin-left: 0 !important;
      box-sizing: border-box !important;
      width: 100% !important;
      height: 100vh !important;
    }
  </style>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule With AI</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: preconnect + non-blocking stylesheet (replaces @import in newspaper-theme.css) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Merriweather:wght@400;700&family=Inter:wght@400;500&display=swap"
    />

    <!-- Font Awesome removed: icons replaced with text/unicode throughout -->

    <link rel="stylesheet" href="assets/css/newspaper-theme.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/calendar.css" />
    <link rel="stylesheet" href="assets/css/ai-calendar.css" />
    <link rel="stylesheet" href="assets/css/work.css" />
    <link rel="stylesheet" href="assets/css/ai-modal-fix.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
    <link rel="stylesheet" href="assets/css/salary.css" />

    <style>
      /* body font-family handled by newspaper-theme.css */

      #auth-loading {
        position: fixed;
        inset: 0;
        background: #f4efe6;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .loading-spinner {
        border: 3px solid #c8b99a;
        border-top: 3px solid #8b0000;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #main-app {
        display: none;
      }

      #main-app.ready {
        display: block;
      }

      #calendar {
        min-height: 600px;
        height: calc(100vh - 200px);
      }

      .fc-event-dragging {
        opacity: 0.7;
        cursor: move !important;
      }

      [draggable="true"] {
        cursor: move;
        transition: opacity 0.2s;
      }

      [draggable="true"]:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <script>
      (function forceSidebarEarly() {
        // Sidebar always 240px expanded
        var style = document.createElement("style");
        style.innerHTML = `
          #sidebar-container {
            display: block !important;
            position: fixed !important;
            left: 0 !important;
            top: 0 !important;
            width: 240px !important;
            min-width: 240px !important;
            height: 100vh !important;
            z-index: 999 !important;
            visibility: visible !important;
            opacity: 1 !important;
          }
          #main-app > .flex-1 { margin-left: 240px !important; }
        `;
        document.head.appendChild(style);
      })();
    </script>

    <div id="auth-loading">
      <div class="text-center">
        <div class="loading-spinner mx-auto"></div>
        <p class="mt-4" style="font-family:'Merriweather',Georgia,serif;font-size:0.85rem;color:#6b5f4a;font-style:italic">Đang kiểm tra đăng nhập...</p>
      </div>
    </div>

    <div id="main-app" class="flex min-h-screen">
      <div id="sidebar-container"></div>

      <div class="flex-1 flex flex-col" style="margin-left: 240px;">
        <!-- Newspaper Masthead -->
        <header id="np-masthead" aria-label="Masthead">
          <div class="np-masthead-rules">
            <div class="np-masthead-rule-thick"></div>
            <div class="np-masthead-rule-thin"></div>
          </div>
          <div class="np-masthead-inner">
            <h1 class="np-masthead-title">Schedule With AI</h1>
            <time class="np-masthead-date" id="np-masthead-date"></time>
          </div>
          <div class="np-masthead-bottom-rules">
            <div class="np-masthead-rule-thin"></div>
            <div class="np-masthead-rule-thick"></div>
          </div>
        </header>

        <div class="flex-1 overflow-auto" id="sections-wrapper" style="display:flex;flex-direction:column;">
          <main id="schedule-section" class="section active" style="flex:1;min-height:0;"></main>
          <main id="work-section" class="section"></main>
          <main id="ai-section" class="section"></main>
          <main id="salary-section" class="section"></main>
          <main id="profile-section" class="section"></main>
        </div>
      </div>
    </div>

    <div id="createTaskModal" class="modal hidden"></div>
    <div id="settingsModal" class="modal hidden"></div>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/utils.js"></script>

    <script src="assets/js/modalManager.js"></script>
    <script src="assets/js/AppNavigation.js"></script>
    <script src="assets/js/componentLoader.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <script src="assets/js/calendarModule.js"></script>
    <script src="assets/js/workManager.js"></script>
    <script src="assets/js/ai-suggestion-handler.js"></script>
    <script src="assets/js/aiModule.js"></script>
    <script src="assets/js/salary-manager.js"></script>
    <script src="assets/js/statsManager.js"></script>
    <script src="assets/js/tabManager.js"></script>
    <!-- profile.js removed: profileManager.js is the full implementation -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>

    <div id="eventDetailModal" class="modal hidden"></div>
    <div id="aiSuggestionModal" class="modal hidden"></div>
    <div id="createCategoryModal" class="modal hidden"></div>
    <div id="profileModal" class="modal hidden"></div>
    <div id="notificationModal" class="modal hidden"></div>

    <script src="assets/js/profileManager.js"></script>
    <script src="assets/js/notificationManager.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="assets/js/app.js"></script>

    <script src="assets/js/modal-force-display.js"></script>
    <script src="assets/js/modal-content-loader.js"></script>

    <script src="assets/js/modal-absolute-fix.js"></script>

    <script>
      // Masthead date
      (function setMastheadDate() {
        const el = document.getElementById('np-masthead-date');
        if (!el) return;
        const now = new Date();
        const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        el.textContent = now.toLocaleDateString('vi-VN', opts);
        el.setAttribute('datetime', now.toISOString().split('T')[0]);
      })();

      // np-swal helper: attach newspaper classes to every Swal.fire call
      (function patchSwal() {
        function waitForSwal() {
          if (window.Swal) {
            const origFire = Swal.fire.bind(Swal);
            Swal.fire = function(opts, ...rest) {
              if (opts && typeof opts === 'object') {
                opts.customClass = Object.assign({ popup: 'np-swal' }, opts.customClass || {});
              }
              return origFire(opts, ...rest);
            };
          } else {
            setTimeout(waitForSwal, 200);
          }
        }
        waitForSwal();
      })();
    </script>

    <script>
      //  Auth check and Font Awesome wait
      (function () {
        const token = localStorage.getItem("auth_token");
        if (!token) return (location.href = "/login.html");

        try {
          const payload = JSON.parse(atob(token.split(".")[1]));
          if (payload.exp * 1000 < Date.now()) throw new Error("Token expired");

          // Show app immediately (Font Awesome removed)
          document.getElementById("auth-loading")?.remove();
          document.getElementById("main-app")?.classList.add("ready");

          function startApp() {
            if (window.App?.init) {
              App.init();
            } else {
              setTimeout(startApp, 100);
            }
          }

          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", startApp);
          } else {
            startApp();
          }
        } catch (err) {
          console.error("Auth error:", err);
          localStorage.clear();
          location.href = "/login.html";
        }
      })();
    </script>
  </body>
</html>
