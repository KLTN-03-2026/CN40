    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }

      #auth-loading {
        position: fixed;
        inset: 0;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .loading-spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #2563EB;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #main-app {
        display: none;
      }

      #main-app.ready {
        display: block;
      }

      body:not(.fa-loaded) i[class*="fa-"],
      body:not(.fa-loaded) span[class*="fa-"] {
        opacity: 0;
      }

      body.fa-loaded i[class*="fa-"],
      body.fa-loaded span[class*="fa-"] {
        opacity: 1;
        transition: opacity 0.2s ease-in-out;
      }

      #calendar {
        min-height: 600px;
        height: calc(100vh - 200px);
      }

      .fc-event-dragging {
        opacity: 0.7;
        cursor: move !important;
      }

      [draggable="true"] {
        cursor: move;
        transition: opacity 0.2s;
      }

      [draggable="true"]:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <script>
      (function forceSidebarEarly() {
        const style = document.createElement("style");
        style.innerHTML = `
          #sidebar-container {
            display: block !important;
            position: fixed !important;
            left: 0 !important;
            top: 0 !important;
            width: 256px !important;
            min-width: 256px !important;
            height: 100vh !important;
            z-index: 999 !important;
            visibility: visible !important;
            opacity: 1 !important;
          }
          #sidebar-container.hidden,
          #sidebar-container.hidden * {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
          }
        `;
        document.head.appendChild(style);
        console.log(" Sidebar force styles injected at page start");
      })();
    </script>

    <script>
      // Load auth modal HTML early, then start app
      (function () {
        function loadAuthModal(callback) {
          const container = document.getElementById('authModalContainer');
          if (!container) return callback();
          fetch('components/modals/auth-modal.html')
            .then(r => r.text())
            .then(html => { container.innerHTML = html; callback(); })
            .catch(() => callback());
        }

        function startApp() {
          if (window.App?.init) {
            App.init();
          } else {
            setTimeout(startApp, 100);
          }
        }

        loadAuthModal(() => {
          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", startApp);
          } else {
            startApp();
          }
        });
      })();
    </script>
